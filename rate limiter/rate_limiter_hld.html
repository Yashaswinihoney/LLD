<text x="380" y="460" text-anchor="middle" font-size="11" fill="#3b6d11">Sliding Log: ZADD client:log {timestamp} + ZCOUNT</text>

<text x="620" y="676" text-anchor="middle" font-size="10" fill="#3b6d11">ZREMRANGEBYSCORE 0 {now-window}</text>
<text x="620" y="692" text-anchor="middle" font-size="10" fill="#3b6d11">ZCARD → if &gt; limit: reject</text>
<text x="620" y="708" text-anchor="middle" font-size="10" fill="#3b6d11">EXPIRE key on each write</text>
