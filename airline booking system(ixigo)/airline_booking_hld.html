<rect x="130" y="456" width="540" height="96" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">PricingStrategy (Strategy Pattern)</text>
<text x="400" y="496" text-anchor="middle" font-size="11" fill="#854f0b">BasePricingStrategy: fixed floor fares per cabin class</text>
<text x="400" y="512" text-anchor="middle" font-size="11" fill="#854f0b">DynamicPricingStrategy: base × demand multiplier (seats left + days to departure)</text>
<text x="400" y="528" text-anchor="middle" font-size="11" fill="#854f0b">SurgePricingStrategy: holiday / peak season multiplier (Diwali 2x, New Year 1.8x)</text>
<text x="400" y="544" text-anchor="middle" font-size="11" fill="#854f0b">DiscountPricingStrategy: promo code % off (IXIGO25 → -25% base fare)</text>

<line x1="400" y1="552" x2="400" y2="592" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Fare Decorator chain -->
<rect x="130" y="592" width="540" height="80" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="612" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">FareDecorator Chain (Decorator Pattern)</text>
<text x="400" y="630" text-anchor="middle" font-size="11" fill="#854f0b">BaseFare(fareType) → AirportTaxDecorator(+18% GST) → ConvenienceFeeDecorator(+₹299/pax)</text>
<text x="400" y="648" text-anchor="middle" font-size="11" fill="#854f0b">→ [optional] TravelInsuranceDecorator(+₹199/pax) → calculate(passengers) = total payable</text>
<text x="400" y="664" text-anchor="middle" font-size="11" fill="#854f0b">Each decorator wraps the previous — add/remove layers without changing base logic</text>

<!-- Dynamic pricing factors callout -->
<rect x="650" y="460" width="140" height="128" rx="6" fill="#fff8e6" stroke="#cc9900"/>
<text x="720" y="480" text-anchor="middle" font-size="10" font-weight="700" fill="#664400">Dynamic Factors</text>
<text x="720" y="496" text-anchor="middle" font-size="9" fill="#664400">≤2 seats → +80%</text>
<text x="720" y="510" text-anchor="middle" font-size="9" fill="#664400">≤5 seats → +50%</text>
<text x="720" y="524" text-anchor="middle" font-size="9" fill="#664400">≤10 seats → +25%</text>
<text x="720" y="540" text-anchor="middle" font-size="9" fill="#664400">Dep ≤1 day → +60%</text>
<text x="720" y="554" text-anchor="middle" font-size="9" fill="#664400">Dep ≤7 days → +10%</text>

<text x="400" y="838" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">AbstractBookingProcessor.processBooking() — 6-step skeleton</text>
<text x="400" y="856" text-anchor="middle" font-size="11" fill="#0f6e56">Step 1: validateAvailability() — seats ≥ pax count; flight not cancelled</text>
<text x="400" y="872" text-anchor="middle" font-size="11" fill="#0f6e56">Step 2: buildFare() — apply Decorator chain (tax + convenience + [insurance])</text>
<text x="400" y="888" text-anchor="middle" font-size="11" fill="#0f6e56">Step 3: createBooking() — Booking.Builder → PNR generated → status=INITIATED</text>
<text x="400" y="904" text-anchor="middle" font-size="11" fill="#0f6e56">Step 4: HoldSeatsCommand.execute() — seats HELD (10-min TTL); notifyAll(onSeatsHeld)</text>
<text x="400" y="920" text-anchor="middle" font-size="11" fill="#0f6e56">Step 5: ConfirmBookingCommand.execute() — payment processed; seats confirmed</text>
<text x="400" y="932" text-anchor="middle" font-size="11" fill="#0f6e56">Step 6: postConfirmation() — e-ticket issued; FFP sync; audit logged</text>

<line x1="400" y1="932" x2="400" y2="972" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Two command boxes side by side -->

<text x="204" y="992" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">HoldSeatsCommand</text>
<text x="204" y="1010" text-anchor="middle" font-size="10" fill="#534ab7">execute(): iterate passengers → findAvailableSeat(cabin)</text>
<text x="204" y="1026" text-anchor="middle" font-size="10" fill="#534ab7">seat.hold(pnr, 10min) → assign to passenger map</text>
<text x="204" y="1042" text-anchor="middle" font-size="10" fill="#534ab7">Partial hold fails → rollback ALL held seats atomically</text>
<text x="204" y="1058" text-anchor="middle" font-size="10" fill="#534ab7">undo(): release all allocated seats → status → AVAILABLE</text>

<rect x="422" y="972" width="348" height="100" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="596" y="992" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">ConfirmBookingCommand</text>
<text x="596" y="1010" text-anchor="middle" font-size="10" fill="#534ab7">execute(): initPayment → PaymentGateway.process()</text>
<text x="596" y="1026" text-anchor="middle" font-size="10" fill="#534ab7">CAPTURED → seat.confirm() → booking.ticket() → notify</text>
<text x="596" y="1042" text-anchor="middle" font-size="10" fill="#534ab7">FAILED → release all holds → booking.cancel(PAYMENT_FAILURE)</text>
<text x="596" y="1058" text-anchor="middle" font-size="10" fill="#534ab7">undo() = CANCEL: compute refund% → initiateRefund() → release seats</text>

<line x1="400" y1="1072" x2="400" y2="1108" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ====== SECTION 14: 5 HARDEST DESIGN DECISIONS ====== -->
<line x1="30" y1="2600" x2="770" y2="2600" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2592" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2608" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2628" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Seat hold must be atomic — synchronized at the Seat level, not booking level</text>
<text x="400" y="2646" text-anchor="middle" font-size="11" fill="#0f6e56">seat.hold() is synchronized. Two concurrent bookings for the last seat → only one succeeds. HoldSeatsCommand rolls back ALL partially-held seats on any failure — partial holds cause phantom unavailability.</text>

<rect x="30" y="2672" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2692" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. 10-minute hold TTL — not the payment SLA</text>
<text x="400" y="2710" text-anchor="middle" font-size="11" fill="#185fa5">Seats are held for only 10 minutes regardless of payment status. Payment gateway can take up to 3 minutes; if user abandons page, the hold must expire and free seats for others. A background scheduler calls releaseExpiredHolds() every 60s.</text>

<rect x="30" y="2736" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2756" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Dynamic pricing must never be cached stale — Redis TTL = 5 min max</text>
<text x="400" y="2774" text-anchor="middle" font-size="11" fill="#854f0b">Fare shown at search time ≠ fare at payment time. Price shown to user is a quote valid for 10 min (the hold window). A price-lock hash is verified at payment — if fare changed, user is warned before charging.</text>

<rect x="30" y="2800" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2820" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Decorator for fare — not hardcoded totals — because add-ons vary per booking</text>
<text x="400" y="2838" text-anchor="middle" font-size="11" fill="#534ab7">Insurance is optional per passenger. Convenience fee differs by payment method (UPI = ₹0, card = ₹299). New fee types can be added as new Decorators without touching BookingProcessor. Total is always recomputed, never cached.</text>

<rect x="30" y="2864" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2884" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. CancelBookingCommand.undo() ≠ full refund — fare type governs refund %</text>
<text x="400" y="2902" text-anchor="middle" font-size="11" fill="#993c1d">SAVER = 50%, FLEXI = 75%, FULL_FLEX = 100%. Airline-cancelled flights bypass fare rules (100% always). Refund amount is computed inside ConfirmBookingCommand.undo() — the Command encapsulates both the action and its reversal policy.</text>

<!-- FINAL BOX -->
<rect x="30" y="2928" width="740" height="56" rx="8" fill="#0d1b2a"/>
<text x="400" y="2950" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Ixigo searches 80M+ fares/day. Booking funnel: search → select → hold → pay in under 3 minutes. 10-min seat hold TTL is a hard constraint driven by GDS allocation rules.</text>
<text x="400" y="2970" text-anchor="middle" font-size="11" fill="#7da9c9">Seat hold is per-seat synchronized. Pricing is Strategy-swappable at runtime. Fare total is Decorator-built. Every state change fan-outs to 5 observers. Payment failure auto-releases all holds.</text>
