<!-- =====================================================
     SECTION 1: THE 3 GOALS
===================================================== -->
<text x="400" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the three goals —</text>

<text x="142" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">High Availability (HA)</text>
<text x="142" y="122" text-anchor="middle" font-size="11" fill="#3b6d11">System is UP and reachable</text>
<text x="142" y="138" text-anchor="middle" font-size="11" fill="#3b6d11">Target: 99.99% uptime</text>
<text x="142" y="154" text-anchor="middle" font-size="11" fill="#3b6d11">= &lt;52 min downtime/year</text>

<rect x="288" y="80" width="224" height="88" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Fault Tolerance</text>
<text x="400" y="122" text-anchor="middle" font-size="11" fill="#185fa5">System works despite failures</text>
<text x="400" y="138" text-anchor="middle" font-size="11" fill="#185fa5">No single point of failure</text>
<text x="400" y="154" text-anchor="middle" font-size="11" fill="#185fa5">Degrade gracefully, not crash</text>

<rect x="546" y="80" width="224" height="88" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="658" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Resilience</text>
<text x="658" y="122" text-anchor="middle" font-size="11" fill="#534ab7">System recovers quickly</text>
<text x="658" y="138" text-anchor="middle" font-size="11" fill="#534ab7">RTO: Recovery Time Objective</text>
<text x="658" y="154" text-anchor="middle" font-size="11" fill="#534ab7">RPO: Recovery Point Objective</text>

<text x="400" y="282" text-anchor="middle" font-size="10" fill="#5f5e5a">Retry with exponential backoff + jitter on timeout</text>

<text x="400" y="398" text-anchor="middle" font-size="11" fill="#854f0b">Health check every 10s — remove unhealthy region automatically</text>
<text x="400" y="414" text-anchor="middle" font-size="11" fill="#854f0b">Anycast routing: request auto-routes to alive PoP</text>

<text x="400" y="508" text-anchor="middle" font-size="11" fill="#185fa5">2+ LB nodes — if one dies, others absorb traffic</text>
<text x="400" y="524" text-anchor="middle" font-size="11" fill="#185fa5">Algorithms: Round-Robin / Least-Connections / IP-Hash</text>
<text x="400" y="540" text-anchor="middle" font-size="11" fill="#185fa5">Health probes every 5s — remove sick servers within 15s</text>

<text x="400" y="680" text-anchor="middle" font-size="11" fill="#0f6e56">Timeout enforcement: every call has a max wait time</text>

<line x1="400" y1="684" x2="400" y2="732" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="550" y1="684" x2="680" y2="732" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="400" y="812" text-anchor="middle" font-size="11" fill="#0f6e56">Auto-scaled by CPU/RPS</text>

<rect x="560" y="756" width="220" height="72" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="670" y="778" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Service C</text>
<text x="670" y="796" text-anchor="middle" font-size="11" fill="#0f6e56">3 replicas (pods)</text>
<text x="670" y="812" text-anchor="middle" font-size="11" fill="#0f6e56">K8s restarts crashed pods</text>

<line x1="130" y1="828" x2="200" y2="872" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="400" y1="828" x2="400" y2="872" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="150" y="896" width="500" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="918" text-anchor="middle" font-size="13" font-weight="700" fill="#3c3489">Kafka (Message Queue) — Durable Buffer</text>
<text x="400" y="936" text-anchor="middle" font-size="11" fill="#534ab7">Producers never wait for consumers — absorbs traffic spikes</text>
<text x="400" y="952" text-anchor="middle" font-size="11" fill="#534ab7">Replication factor 3: survives 2 broker failures | Replayable on crash</text>

<line x1="400" y1="960" x2="400" y2="988" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="20"  y="1056" width="260" height="76" rx="8" fill="#faeeda" stroke="#ba7517"/>

<text x="400" y="1112" text-anchor="middle" font-size="11" fill="#3b6d11">Sentinel auto-failover</text>

<text x="650" y="1112" text-anchor="middle" font-size="11" fill="#854f0b">Cross-region replication</text>

<!-- =====================================================
     SECTION 3: CIRCUIT BREAKER
===================================================== -->
<line x1="30" y1="1200" x2="770" y2="1200" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1192" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— circuit breaker pattern (most important resilience pattern) —</text>

<!-- 3 states -->
<rect x="30"  y="1208" width="220" height="120" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="140" y="1230" text-anchor="middle" font-size="13" font-weight="700" fill="#27500a">CLOSED ✓</text>
<text x="140" y="1252" text-anchor="middle" font-size="11" fill="#3b6d11">Normal operation</text>
<text x="140" y="1268" text-anchor="middle" font-size="11" fill="#3b6d11">Requests pass through</text>
<text x="140" y="1284" text-anchor="middle" font-size="11" fill="#3b6d11">Counting failures...</text>
<text x="140" y="1300" text-anchor="middle" font-size="10" fill="#3b6d11" font-style="italic">threshold: 5 failures / 10s</text>

<rect x="290" y="1208" width="220" height="120" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="1230" text-anchor="middle" font-size="13" font-weight="700" fill="#712b13">OPEN ✗</text>
<text x="400" y="1252" text-anchor="middle" font-size="11" fill="#993c1d">Downstream is failing</text>
<text x="400" y="1268" text-anchor="middle" font-size="11" fill="#993c1d">Block ALL requests immediately</text>
<text x="400" y="1284" text-anchor="middle" font-size="11" fill="#993c1d">Return fallback / error fast</text>
<text x="400" y="1300" text-anchor="middle" font-size="10" fill="#993c1d" font-style="italic">no wasted threads waiting</text>

<rect x="550" y="1208" width="220" height="120" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="660" y="1230" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">HALF-OPEN ⟳</text>
<text x="660" y="1252" text-anchor="middle" font-size="11" fill="#854f0b">After timeout (e.g. 30s)</text>
<text x="660" y="1268" text-anchor="middle" font-size="11" fill="#854f0b">Allow 1 probe request</text>
<text x="660" y="1284" text-anchor="middle" font-size="11" fill="#854f0b">Success → CLOSED again</text>
<text x="660" y="1300" text-anchor="middle" font-size="10" fill="#854f0b" font-style="italic">Fail → back to OPEN</text>

<!-- arrows between states -->
<line x1="250" y1="1268" x2="288" y2="1268" stroke="#d85a30" stroke-width="1.5" marker-end="url(#arrow-r)"/>
<text x="270" y="1258" font-size="9" text-anchor="middle" fill="#d85a30">threshold</text>
<text x="270" y="1282" font-size="9" text-anchor="middle" fill="#d85a30">exceeded</text>

<line x1="510" y1="1268" x2="548" y2="1268" stroke="#ba7517" stroke-width="1.5" marker-end="url(#arrow-o)"/>
<text x="530" y="1258" font-size="9" text-anchor="middle" fill="#ba7517">timeout</text>
<text x="530" y="1282" font-size="9" text-anchor="middle" fill="#ba7517">elapsed</text>

<!-- WHY CIRCUIT BREAKER -->
<rect x="30" y="1344" width="740" height="64" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="400" y="1366" text-anchor="middle" font-size="12" font-weight="600" fill="#2c2c2a">Why it matters: without circuit breaker — cascade failure</text>
<text x="400" y="1384" text-anchor="middle" font-size="11" fill="#5f5e5a">Service A calls B (which is down) → A threads pile up waiting → A's thread pool exhausts → A dies → C calling A also dies → full outage</text>
<text x="400" y="1400" text-anchor="middle" font-size="11" fill="#5f5e5a">With circuit breaker: A detects B is down, opens circuit, returns error fast — A stays alive and serves other requests</text>

<!-- =====================================================
     SECTION 4: RETRY + TIMEOUT + FALLBACK
===================================================== -->
<line x1="30" y1="1472" x2="770" y2="1472" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1464" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— retry / timeout / fallback — the trio that keeps services alive —</text>

<rect x="30"  y="1480" width="230" height="120" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="145" y="1502" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Retry with Backoff</text>
<text x="145" y="1522" text-anchor="middle" font-size="11" fill="#185fa5">Retry on transient errors only</text>
<text x="145" y="1538" text-anchor="middle" font-size="11" fill="#185fa5">Exponential backoff:</text>
<text x="145" y="1554" text-anchor="middle" font-size="11" fill="#185fa5">1s → 2s → 4s → 8s</text>
<text x="145" y="1570" text-anchor="middle" font-size="11" fill="#185fa5">+ Jitter (avoid thundering</text>
<text x="145" y="1586" text-anchor="middle" font-size="11" fill="#185fa5">herd on retry storm)</text>

<rect x="285" y="1480" width="230" height="120" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="1502" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Timeouts (mandatory)</text>
<text x="400" y="1522" text-anchor="middle" font-size="11" fill="#185fa5">Every outbound call: timeout</text>
<text x="400" y="1538" text-anchor="middle" font-size="11" fill="#185fa5">Connect timeout: 1s</text>
<text x="400" y="1554" text-anchor="middle" font-size="11" fill="#185fa5">Read timeout: 3s</text>
<text x="400" y="1570" text-anchor="middle" font-size="11" fill="#185fa5">Never wait forever —</text>
<text x="400" y="1586" text-anchor="middle" font-size="11" fill="#185fa5">threads are finite</text>

<rect x="540" y="1480" width="230" height="120" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="655" y="1502" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Graceful Fallback</text>
<text x="655" y="1522" text-anchor="middle" font-size="11" fill="#185fa5">Serve stale cache on miss</text>
<text x="655" y="1538" text-anchor="middle" font-size="11" fill="#185fa5">Return partial data</text>
<text x="655" y="1554" text-anchor="middle" font-size="11" fill="#185fa5">Static default response</text>
<text x="655" y="1570" text-anchor="middle" font-size="11" fill="#185fa5">Degrade feature not service</text>
<text x="655" y="1586" text-anchor="middle" font-size="11" fill="#185fa5">(e.g. hide recs, keep checkout)</text>

<!-- =====================================================
     SECTION 5: MULTI-REGION DEPLOYMENT
===================================================== -->
<line x1="30" y1="1668" x2="770" y2="1668" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1660" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— multi-region deployment: surviving datacenter failure —</text>

<!-- Active-Active -->
<rect x="30"  y="1676" width="350" height="136" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="205" y="1698" text-anchor="middle" font-size="13" font-weight="700" fill="#27500a">Active-Active</text>
<text x="205" y="1718" text-anchor="middle" font-size="11" fill="#3b6d11">Both regions serve live traffic</text>
<text x="205" y="1734" text-anchor="middle" font-size="11" fill="#3b6d11">GeoDNS routes users to nearest region</text>
<text x="205" y="1750" text-anchor="middle" font-size="11" fill="#3b6d11">Data synced bidirectionally (conflicts possible)</text>
<text x="205" y="1766" text-anchor="middle" font-size="11" fill="#3b6d11">RTO ≈ 0 (instant failover)</text>
<text x="205" y="1782" text-anchor="middle" font-size="11" fill="#3b6d11">✓ Best HA  ✗ Complex + expensive</text>
<text x="205" y="1798" text-anchor="middle" font-size="11" fill="#3b6d11">Use: WhatsApp, Netflix, Razorpay</text>

<!-- Active-Passive -->
<rect x="420" y="1676" width="350" height="136" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="595" y="1698" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">Active-Passive</text>
<text x="595" y="1718" text-anchor="middle" font-size="11" fill="#854f0b">Primary region serves traffic</text>
<text x="595" y="1734" text-anchor="middle" font-size="11" fill="#854f0b">Standby region replicates data</text>
<text x="595" y="1750" text-anchor="middle" font-size="11" fill="#854f0b">Failover: DNS cutover to standby</text>
<text x="595" y="1766" text-anchor="middle" font-size="11" fill="#854f0b">RTO ≈ 1-5 min  RPO ≈ seconds</text>
<text x="595" y="1782" text-anchor="middle" font-size="11" fill="#854f0b">✓ Simpler  ✗ Standby is wasted cost</text>
<text x="595" y="1798" text-anchor="middle" font-size="11" fill="#854f0b">Use: smaller services, non-critical paths</text>

<!-- =====================================================
     SECTION 6: DATABASE HA STRATEGIES
===================================================== -->
<line x1="30" y1="1880" x2="770" y2="1880" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1872" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— database high availability strategies —</text>

<rect x="30"  y="1888" width="220" height="132" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="140" y="1910" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Primary-Replica</text>
<text x="140" y="1930" text-anchor="middle" font-size="11" fill="#854f0b">1 primary (writes)</text>
<text x="140" y="1946" text-anchor="middle" font-size="11" fill="#854f0b">2+ read replicas</text>
<text x="140" y="1962" text-anchor="middle" font-size="11" fill="#854f0b">Patroni: auto-promote</text>
<text x="140" y="1978" text-anchor="middle" font-size="11" fill="#854f0b">on primary failure</text>
<text x="140" y="1994" text-anchor="middle" font-size="11" fill="#854f0b">Failover &lt;30s</text>

<rect x="270" y="1888" width="220" height="132" rx="8" fill="#faeeda" stroke="#ba7517"/>
