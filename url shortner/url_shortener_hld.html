<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { font-family: sans-serif; background: #f9f9f7; padding: 24px; }
  svg  { max-width: 820px; display: block; margin: auto; }
</style>
</head><body>
<svg viewBox="0 0 760 1820" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#d85a30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534ab7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ====== SECTION 1: URL SHORTENING FLOW ====== -->
<text x="380" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#888">— URL shortening flow (write path) —</text>

<!-- CLIENT -->
<rect x="260" y="32" width="240" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Client</text>
<text x="380" y="68" text-anchor="middle" font-size="11" fill="#5f5e5a">POST /shorten {longUrl, alias?, expiresAt?}</text>

<line x1="380" y1="84" x2="380" y2="116" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- API GATEWAY -->
<rect x="240" y="116" width="280" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">API Gateway</text>
<text x="380" y="154" text-anchor="middle" font-size="11" fill="#5f5e5a">Auth, rate limiting (100 req/min/user)</text>

<line x1="380" y1="168" x2="380" y2="204" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- URL SHORTENER SERVICE -->
<rect x="190" y="204" width="380" height="76" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">URL Shortener Service</text>
<text x="380" y="244" text-anchor="middle" font-size="11" fill="#0f6e56">1. Validate URL (format + blocked domains)</text>
<text x="380" y="260" text-anchor="middle" font-size="11" fill="#0f6e56">2. Check deduplication cache (same URL = same code)</text>
<text x="380" y="276" text-anchor="middle" font-size="11" fill="#0f6e56">3. Handle custom alias or generate new code</text>

<!-- invalid URL -->
<line x1="190" y1="240" x2="90" y2="296" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="78" y="278" font-size="10" text-anchor="end" fill="#d85a30">invalid / blocked</text>
<rect x="16" y="296" width="148" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="90" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#712b13">HTTP 400 Rejected</text>

<line x1="380" y1="280" x2="380" y2="328" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- DEDUP CHECK -->
<rect x="190" y="328" width="380" height="64" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="380" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#27500a">Deduplication Check (Redis)</text>
<text x="380" y="368" text-anchor="middle" font-size="11" fill="#3b6d11">Key: hash(longUrl) → shortCode</text>
<text x="380" y="384" text-anchor="middle" font-size="11" fill="#3b6d11">If found + not expired → return existing code</text>

<!-- dedup hit -->
<line x1="570" y1="360" x2="640" y2="412" stroke="#0f6e56" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-g)"/>
<text x="648" y="394" font-size="10" fill="#0f6e56">hit → return</text>
<rect x="560" y="412" width="190" height="44" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="655" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">Existing short URL</text>

<!-- dedup miss -->
<line x1="380" y1="392" x2="380" y2="440" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="396" y="420" font-size="10" fill="#888">miss → generate</text>

<!-- ID GENERATOR -->
<rect x="190" y="440" width="380" height="76" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">ID Generator + Encoding (Strategy)</text>
<text x="380" y="480" text-anchor="middle" font-size="11" fill="#534ab7">Snowflake ID or DB auto-increment → Base62 encode</text>
<text x="380" y="496" text-anchor="middle" font-size="11" fill="#534ab7">Custom alias: check uniqueness → reserve in Redis</text>
<text x="380" y="512" text-anchor="middle" font-size="11" fill="#534ab7">Collision check: retry with next ID if taken</text>

<line x1="380" y1="516" x2="380" y2="564" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PARALLEL WRITE -->
<line x1="300" y1="584" x2="160" y2="628" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="584" x2="600" y2="628" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="564" width="380" height="28" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="583" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Parallel write: Redis cache + PostgreSQL DB</text>

<rect x="40"  y="628" width="220" height="64" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="150" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Redis Write</text>
<text x="150" y="668" text-anchor="middle" font-size="11" fill="#3b6d11">shortCode → longUrl (TTL = expiry)</text>
<text x="150" y="684" text-anchor="middle" font-size="11" fill="#3b6d11">hash(longUrl) → shortCode (dedup)</text>

<rect x="500" y="628" width="220" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="610" y="650" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">PostgreSQL Write</text>
<text x="610" y="668" text-anchor="middle" font-size="11" fill="#185fa5">Persist: code, longUrl, userId, expiry</text>
<text x="610" y="684" text-anchor="middle" font-size="11" fill="#185fa5">Source of truth for analytics + audit</text>

<!-- return short URL -->
<line x1="150" y1="692" x2="300" y2="736" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="610" y1="692" x2="460" y2="736" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="736" width="320" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="758" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Return short URL to client</text>

<!-- ====== SECTION 2: REDIRECT FLOW ====== -->
<line x1="40" y1="836" x2="720" y2="836" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="828" text-anchor="middle" font-size="11" fill="#888">— redirect flow (read path — hot path, must be &lt; 10ms) —</text>

<rect x="260" y="844" width="240" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="864" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">User clicks short URL</text>
<text x="380" y="880" text-anchor="middle" font-size="11" fill="#5f5e5a">GET sho.rt/{shortCode}</text>

<line x1="380" y1="896" x2="380" y2="928" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- CDN EDGE -->
<rect x="210" y="928" width="340" height="64" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="950" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">CDN Edge Node (Cloudfront)</text>
<text x="380" y="968" text-anchor="middle" font-size="11" fill="#854f0b">Cache popular short codes at edge</text>
<text x="380" y="984" text-anchor="middle" font-size="11" fill="#854f0b">HTTP 301 (perm) / 302 (temp) redirect cached</text>

<!-- CDN hit -->
<line x1="550" y1="960" x2="630" y2="1012" stroke="#0f6e56" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-g)"/>
<text x="638" y="994" font-size="10" fill="#0f6e56">CDN hit</text>
<rect x="558" y="1012" width="190" height="44" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="653" y="1038" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">Redirect instantly</text>

<!-- CDN miss → Redis -->
<line x1="380" y1="992" x2="380" y2="1040" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="396" y="1020" font-size="10" fill="#888">CDN miss → origin</text>

<!-- REDIS LOOKUP -->
<rect x="190" y="1040" width="380" height="64" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="380" y="1062" text-anchor="middle" font-size="13" font-weight="600" fill="#27500a">Redis Lookup (cache hit/miss)</text>
<text x="380" y="1080" text-anchor="middle" font-size="11" fill="#3b6d11">GET shortCode → longUrl</text>
<text x="380" y="1096" text-anchor="middle" font-size="11" fill="#3b6d11">Also check: expired? deleted? TTL elapsed?</text>

<!-- Redis hit -->
<line x1="190" y1="1068" x2="90" y2="1120" stroke="#0f6e56" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-g)"/>
<text x="78" y="1104" font-size="10" text-anchor="end" fill="#0f6e56">cache hit</text>
<rect x="16" y="1120" width="148" height="52" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="90" y="1142" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">HTTP 301/302</text>
<text x="90" y="1158" text-anchor="middle" font-size="10" fill="#3b6d11">Redirect to longUrl</text>

<!-- Redis miss → DB -->
<line x1="380" y1="1104" x2="380" y2="1152" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="396" y="1132" font-size="10" fill="#888">cache miss</text>

<!-- DB LOOKUP -->
<rect x="190" y="1152" width="380" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="1174" text-anchor="middle" font-size="13" font-weight="600" fill="#0c447c">PostgreSQL Lookup</text>
<text x="380" y="1190" text-anchor="middle" font-size="11" fill="#185fa5">SELECT longUrl WHERE shortCode = ? → repopulate Redis</text>

<!-- not found -->
<line x1="570" y1="1178" x2="640" y2="1228" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<rect x="558" y="1228" width="190" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="653" y="1254" text-anchor="middle" font-size="11" font-weight="600" fill="#712b13">HTTP 404 Not Found</text>

<line x1="380" y1="1204" x2="380" y2="1252" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ANALYTICS ASYNC -->
<rect x="190" y="1252" width="380" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="1274" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Async Analytics (Kafka)</text>
<text x="380" y="1292" text-anchor="middle" font-size="11" fill="#534ab7">Publish click event: code, IP, userAgent, timestamp</text>
<text x="380" y="1308" text-anchor="middle" font-size="11" fill="#534ab7">Non-blocking — redirect happens immediately</text>

<line x1="380" y1="1316" x2="380" y2="1352" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="1352" width="320" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="1378" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">HTTP 302 → longUrl (redirect complete)</text>

<!-- ====== SECTION 3: ANALYTICS + CLEANUP ====== -->
<line x1="40" y1="1448" x2="720" y2="1448" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1440" text-anchor="middle" font-size="11" fill="#888">— analytics + expiry cleanup flow —</text>

<line x1="300" y1="1468" x2="160" y2="1512" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="1468" x2="600" y2="1512" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="1456" width="380" height="20" rx="6" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="1470" text-anchor="middle" font-size="11" font-weight="600" fill="#0c447c">Kafka consumers process click events</text>

<rect x="30"  y="1512" width="240" height="76" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="150" y="1534" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Analytics DB (Cassandra)</text>
<text x="150" y="1552" text-anchor="middle" font-size="11" fill="#3b6d11">Click count per code + per day</text>
<text x="150" y="1568" text-anchor="middle" font-size="11" fill="#3b6d11">Geo distribution, device, referrer</text>
<text x="150" y="1584" text-anchor="middle" font-size="11" fill="#3b6d11">Time-series for dashboard charts</text>

<rect x="490" y="1512" width="240" height="76" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="610" y="1534" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Expiry Cleanup Job</text>
<text x="610" y="1552" text-anchor="middle" font-size="11" fill="#854f0b">Redis TTL auto-expires short codes</text>
<text x="610" y="1568" text-anchor="middle" font-size="11" fill="#854f0b">Batch job marks DB rows as EXPIRED</text>
<text x="610" y="1584" text-anchor="middle" font-size="11" fill="#854f0b">Reclaims short codes for reuse</text>

<!-- ====== DATA STORES ====== -->
<line x1="40" y1="1652" x2="720" y2="1652" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1644" text-anchor="middle" font-size="11" fill="#888">— key data stores —</text>

<rect x="20"  y="1660" width="160" height="100" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="100" y="1682" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">Redis</text>
<text x="100" y="1700" text-anchor="middle" font-size="10" fill="#3b6d11">shortCode → longUrl</text>
<text x="100" y="1716" text-anchor="middle" font-size="10" fill="#3b6d11">hash(url) → code</text>
<text x="100" y="1732" text-anchor="middle" font-size="10" fill="#3b6d11">TTL = expiry time</text>
<text x="100" y="1748" text-anchor="middle" font-size="10" fill="#3b6d11">Sub-ms reads</text>

<rect x="196" y="1660" width="160" height="100" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="276" y="1682" text-anchor="middle" font-size="11" font-weight="600" fill="#0c447c">PostgreSQL</text>
<text x="276" y="1700" text-anchor="middle" font-size="10" fill="#185fa5">All URL records</text>
<text x="276" y="1716" text-anchor="middle" font-size="10" fill="#185fa5">userId, created, expiry</text>
<text x="276" y="1732" text-anchor="middle" font-size="10" fill="#185fa5">Source of truth</text>
<text x="276" y="1748" text-anchor="middle" font-size="10" fill="#185fa5">Sharded by shortCode</text>

<rect x="372" y="1660" width="160" height="100" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="452" y="1682" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">Kafka</text>
<text x="452" y="1700" text-anchor="middle" font-size="10" fill="#534ab7">Click event stream</text>
<text x="452" y="1716" text-anchor="middle" font-size="10" fill="#534ab7">Async analytics</text>
<text x="452" y="1732" text-anchor="middle" font-size="10" fill="#534ab7">Decouple redirect</text>
<text x="452" y="1748" text-anchor="middle" font-size="10" fill="#534ab7">from analytics</text>

<rect x="548" y="1660" width="192" height="100" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="644" y="1682" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">Cassandra</text>
<text x="644" y="1700" text-anchor="middle" font-size="10" fill="#854f0b">Click time-series</text>
<text x="644" y="1716" text-anchor="middle" font-size="10" fill="#854f0b">Geo + device data</text>
<text x="644" y="1732" text-anchor="middle" font-size="10" fill="#854f0b">Write-heavy, fast</text>
<text x="644" y="1748" text-anchor="middle" font-size="10" fill="#854f0b">90-day retention</text>

</svg>
</body></html>
