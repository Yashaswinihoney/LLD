<line x1="380" y1="476" x2="380" y2="528" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="396" y="725" font-size="10" fill="#888">POST /bookings {hotelId, roomId, checkIn, checkOut}</text>

<text x="380" y="804" text-anchor="middle" font-size="11" fill="#534ab7">SET room:{id}:{date}:lock NX PX 600000</text>
<text x="380" y="820" text-anchor="middle" font-size="11" fill="#534ab7">TTL 10 min — auto-releases if payment abandoned</text>

<text x="380" y="1016" text-anchor="middle" font-size="11" fill="#534ab7">BookingId as idempotency key</text>

<text x="650" y="1076" text-anchor="middle" font-size="10" fill="#993c1d">Dates back to AVAILABLE</text>

<text x="380" y="1112" text-anchor="middle" font-size="11" fill="#0f6e56">Write Booking record to PostgreSQL</text>
<text x="380" y="1128" text-anchor="middle" font-size="11" fill="#0f6e56">Dates BOOKED in Redis + DB</text>
<text x="380" y="1144" text-anchor="middle" font-size="11" fill="#0f6e56">Publish to Kafka — booking-events topic</text>
