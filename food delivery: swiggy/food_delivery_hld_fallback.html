<!-- ====== SECTION 4: 3-LAYER DEFENCE ====== -->
<line x1="40" y1="1828" x2="720" y2="1828" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1820" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 3-layer defence (applied to every critical service) —</text>

<!-- Layer 1 -->
<rect x="20"  y="1836" width="224" height="144" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="132" y="1858" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">Layer 1 · Circuit Breaker</text>
<text x="132" y="1876" text-anchor="middle" font-size="10" fill="#993c1d">CLOSED → calls pass normally</text>
<text x="132" y="1892" text-anchor="middle" font-size="10" fill="#993c1d">OPEN → 5 failures / 10s window</text>
<text x="132" y="1908" text-anchor="middle" font-size="10" fill="#993c1d">→ fail-fast, return cached data</text>
<text x="132" y="1924" text-anchor="middle" font-size="10" fill="#993c1d">HALF_OPEN → 1 probe after 30s</text>
<text x="132" y="1940" text-anchor="middle" font-size="10" fill="#993c1d">success → CLOSED · fail → OPEN</text>
<text x="132" y="1956" text-anchor="middle" font-size="10" fill="#993c1d">On: Search · Order · Dispatch</text>
<text x="132" y="1972" text-anchor="middle" font-size="10" fill="#993c1d">Payment · Notification · Pricing</text>

<!-- Layer 2 -->
<rect x="268" y="1836" width="224" height="144" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="1858" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Layer 2 · Stale Cache</text>
<text x="380" y="1876" text-anchor="middle" font-size="10" fill="#185fa5">Redis holds restaurant list by</text>
<text x="380" y="1892" text-anchor="middle" font-size="10" fill="#185fa5">GeoHash (TTL 2 min) — served</text>
<text x="380" y="1908" text-anchor="middle" font-size="10" fill="#185fa5">when Restaurant Svc is down</text>
<text x="380" y="1924" text-anchor="middle" font-size="10" fill="#185fa5">Agent last-known location (TTL 15s)</text>
<text x="380" y="1940" text-anchor="middle" font-size="10" fill="#185fa5">serves live map on GPS blip</text>
<text x="380" y="1956" text-anchor="middle" font-size="10" fill="#185fa5">Menu availability snapshot cached</text>
<text x="380" y="1972" text-anchor="middle" font-size="10" fill="#185fa5">until Inventory Svc recovers</text>

<!-- Layer 3 -->
<rect x="516" y="1836" width="224" height="144" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="628" y="1858" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">Layer 3 · Graceful Degrade</text>
<text x="628" y="1876" text-anchor="middle" font-size="10" fill="#3b6d11">No agents nearby → widen radius</text>
<text x="628" y="1892" text-anchor="middle" font-size="10" fill="#3b6d11">or show "High demand" ETA bump</text>
<text x="628" y="1908" text-anchor="middle" font-size="10" fill="#3b6d11">Payment fails → retry chain</text>
<text x="628" y="1924" text-anchor="middle" font-size="10" fill="#3b6d11">(UPI → card → wallet → COD)</text>
<text x="628" y="1940" text-anchor="middle" font-size="10" fill="#3b6d11">GPS lost → dead-reckoning +</text>
<text x="628" y="1956" text-anchor="middle" font-size="10" fill="#3b6d11">last-known pin with "Updating…"</text>
<text x="628" y="1972" text-anchor="middle" font-size="10" fill="#3b6d11">Kafka buffers events: zero loss</text>

<line x1="40" y1="2040" x2="720" y2="2040" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>

<text x="380" y="2072" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Circuit Breaker — wraps every external call (Hystrix / Resilience4j)</text>

<text x="194" y="2126" text-anchor="middle" font-size="9"  fill="#3b6d11">All calls pass ✓</text>

<!-- CLOSED → OPEN -->
<line x1="254" y1="2114" x2="358" y2="2114" stroke="#d85a30" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-r)"/>
<text x="306" y="2106" text-anchor="middle" font-size="9" fill="#d85a30">≥5 failures / 10s</text>
<text x="306" y="2126" text-anchor="middle" font-size="9" fill="#d85a30">or p99 latency &gt;1s</text>

<text x="137" y="3970" text-anchor="middle" font-size="9"  fill="#3b6d11">No ping → show last pin with</text>
<text x="137" y="3986" text-anchor="middle" font-size="9"  fill="#3b6d11">"Updating…" indicator</text>
<text x="137" y="3996" text-anchor="middle" font-size="9"  fill="#3b6d11">User sees glide, not freeze</text>

<rect x="268" y="3916" width="210" height="88" rx="6" fill="#faeeda" stroke="#ba7517"/>

<text x="373" y="3954" text-anchor="middle" font-size="9"  fill="#854f0b">Use last heading + speed to</text>
<text x="373" y="3970" text-anchor="middle" font-size="9"  fill="#854f0b">project position forward on map</text>
<text x="373" y="3986" text-anchor="middle" font-size="9"  fill="#854f0b">Snap to road network via</text>

<!-- ====== SECTION 11: 5 CRITICAL FALLBACK DECISIONS ====== -->
<line x1="40" y1="4076" x2="720" y2="4076" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="4068" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="20"  y="4084" width="720" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="4104" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Kafka offset committed AFTER PostgreSQL write — never before</text>
<text x="380" y="4124" text-anchor="middle" font-size="11" fill="#0f6e56">If Order Service crashes after publishing to Kafka but before writing to PostgreSQL, the Kafka event is replayed and the DB write retried — order is recovered. If the offset is committed first, the event is never replayed and the order silently vanishes. Outbox pattern: DB write and Kafka publish in the same transaction via the transactional outbox table.</text>

<rect x="20"  y="4156" width="720" height="60" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="4176" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">2. Dispatch must widen the search radius — never leave an order stranded</text>
<text x="380" y="4196" text-anchor="middle" font-size="11" fill="#854f0b">If no agent is found within 2km (GeoHash cell), the Dispatch Service widens to 3km, then 5km, with increasing ETA estimates shown to the user. The order is never silently abandoned — it enters a retry queue. An unassigned order is far worse for the business than a slightly longer ETA; food gets cold but the relationship survives. After 15 min unassigned: restaurant notified, order may be cancelled with full refund.</text>

<rect x="20"  y="4228" width="720" height="60" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="4248" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">3. Payment is idempotent on orderId — never the user session or request ID</text>
<text x="380" y="4268" text-anchor="middle" font-size="11" fill="#534ab7">Gateway timeout on payment triggers client retry. The same orderId is sent — the gateway deduplicates. This holds across all fallback levels: primary PG, secondary PG, wallet, and Kafka async queue. A single orderId maps to exactly one charge regardless of retry count, network blip, or service restart. Without this: Rs. 500 biryani order becomes Rs. 1000 double charge at scale.</text>

<rect x="20"  y="4300" width="720" height="60" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="380" y="4320" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">4. Agent location TTL = 15s — expired entry means agent is offline</text>
<text x="380" y="4340" text-anchor="middle" font-size="11" fill="#3b6d11">Agent GPS entries in Redis have a strict 15-second TTL. If the agent app loses connectivity and stops streaming, the entry expires and the agent is treated as unavailable for dispatch. This prevents assigning new orders to a ghost agent who may have logged off or crashed. After TTL expiry the live map shows "Updating…" — the user sees a graceful indicator, not a frozen pin stuck at a wrong location.</text>

<rect x="20"  y="4372" width="720" height="60" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="380" y="4392" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Menu availability is validated at order time, not only at add-to-cart time</text>
<text x="380" y="4412" text-anchor="middle" font-size="11" fill="#993c1d">An item may be marked available when added to cart but sold out by the time the order is placed (especially during peak lunch/dinner hours). Order Service re-validates every line item against the restaurant's live availability before accepting payment. If any item is now unavailable, the order is rejected with a clear per-item message — not a generic error. This prevents payment for items that cannot be fulfilled.</text>
