<text x="205" y="1782" text-anchor="middle" font-size="11" fill="#854f0b">No double-booking across DST transitions</text>

<text x="595" y="1734" text-anchor="middle" font-size="11" fill="#185fa5">IST 9am-6pm ∩ EST 9am-6pm ∩ GMT 9am-6pm</text>
<text x="595" y="1750" text-anchor="middle" font-size="11" fill="#185fa5">Intersection: 6:30PM IST = 9AM EST = 2PM GMT</text>
<text x="595" y="1766" text-anchor="middle" font-size="11" fill="#185fa5">Show each attendee time in THEIR timezone</text>
<text x="595" y="1782" text-anchor="middle" font-size="11" fill="#185fa5">Alice sees 6:30PM | Carol sees 9:00AM</text>

<!-- ====== SECTION 8: 5 HARDEST DECISIONS ====== -->
<line x1="30" y1="2072" x2="770" y2="2072" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2064" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 5 hardest design decisions —</text>

<rect x="30" y="2080" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2100" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Conflict check algorithm — Redis sorted set ZRANGEBYSCORE</text>
<text x="400" y="2118" text-anchor="middle" font-size="11" fill="#0f6e56">userId → ZSET{score=startEpoch, member=meetingId}. ZRANGEBYSCORE(0, newEnd) fetches potentially overlapping IDs. Then exact overlap check: start &lt; otherEnd AND end &gt; otherStart.</text>

<rect x="30" y="2144" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2164" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Store all times in UTC — convert to local only at display</text>
<text x="400" y="2182" text-anchor="middle" font-size="11" fill="#185fa5">Never store local time strings in DB. ZonedDateTime in code, UTC epoch in DB. Convert using user's ZoneId at render time. DST-safe, works for any timezone, no ambiguity.</text>

<rect x="30" y="2208" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2228" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Recurring meetings — store rule once, expand on read or batch expand</text>
<text x="400" y="2246" text-anchor="middle" font-size="11" fill="#854f0b">Option A (expand on read): compute instances from rule at query time. Flexible but CPU-intensive. Option B (pre-expand): store all instances in DB. Fast reads, high storage. Hybrid: pre-expand 4 weeks ahead via background job.</text>

<rect x="30" y="2272" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2292" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Reschedule command — undo/redo support for organiser</text>
<text x="400" y="2310" text-anchor="middle" font-size="11" fill="#534ab7">RescheduleCommand stores previous slot + room. execute() moves to new slot. undo() restores old slot. A command history stack supports multi-level undo. Notifies all attendees on both execute and undo.</text>

<rect x="30" y="2336" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2356" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Concurrency — two organisers booking the same room simultaneously</text>
<text x="400" y="2374" text-anchor="middle" font-size="11" fill="#993c1d">DB-level: optimistic locking on room_bookings (version column). App-level: Redis lock on roomId during booking window. If lock fails → retry with next available room. Same problem as inventory reservation.</text>

<!-- FINAL -->
<rect x="30" y="2408" width="740" height="60" rx="8" fill="#2c2c2a"/>
<text x="400" y="2430" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Google Calendar handles 3 billion events. The core data structure is a per-user sorted set indexed by start time.</text>
<text x="400" y="2450" text-anchor="middle" font-size="11" fill="#aaa">Conflict detection = range query on that sorted set. Finding a slot = computing the complement of busy intervals within working hours.</text>
