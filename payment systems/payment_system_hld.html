<text x="380" y="1476" text-anchor="middle" font-size="11" fill="#534ab7">All legs must succeed or all are refunded</text>
<text x="380" y="1488" text-anchor="middle" font-size="11" fill="#534ab7">Each leg has its own idempotency key (retryable)</text>

<line x1="40" y1="2072" x2="720" y2="2072" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="2064" text-anchor="middle" font-size="11" fill="#888">— critical payment system rules —</text>

<rect x="20" y="2080" width="720" height="112" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="2102" text-anchor="middle" font-size="12" font-weight="600" fill="#2c2c2a">The 4 rules every payment system must enforce</text>
<text x="380" y="2122" text-anchor="middle" font-size="11" fill="#5f5e5a">1. Idempotency: same idempotency key = same result, no double charges even on retry</text>
<text x="380" y="2140" text-anchor="middle" font-size="11" fill="#5f5e5a">2. Record first: persist txn as INITIATED before calling gateway — never lose a transaction</text>
<text x="380" y="2158" text-anchor="middle" font-size="11" fill="#5f5e5a">3. Money as integers: store in paise/cents — never use floating point for money</text>
