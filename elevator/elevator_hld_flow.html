<text x="380" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#888">— ride request flow —</text>

<rect x="560" y="32" width="160" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>

<line x1="380" y1="184" x2="380" y2="216" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="380" y="272" text-anchor="middle" font-size="11" fill="#0f6e56">Queries Elevator State Store (Redis)</text>

<line x1="300" y1="280" x2="160" y2="328" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="280" x2="590" y2="328" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="605" y="384" text-anchor="middle" font-size="11" fill="#185fa5">Floor demand predictions</text>

<line x1="40" y1="1108" x2="720" y2="1108" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
