<text x="380" y="2058" text-anchor="middle" font-size="12" font-weight="600" fill="#2c2c2a">How to handle price changes (Amazon / Flipkart rules)</text>

<rect x="20"  y="2736" width="350" height="196" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="195" y="2758" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">Cart Service Crash</text>
<text x="195" y="2776" text-anchor="middle" font-size="10" fill="#0f6e56">Root: OOM / exception / deployment rollout</text>
<text x="32"  y="2796" font-size="10" font-weight="600" fill="#085041">Impact:</text>
<text x="195" y="2812" text-anchor="middle" font-size="10" fill="#0f6e56">POST /cart/items returns 503 — item not added</text>
<text x="195" y="2828" text-anchor="middle" font-size="10" fill="#0f6e56">Existing cart still readable from Redis (TTL 7d)</text>
<text x="195" y="2844" text-anchor="middle" font-size="10" fill="#0f6e56">Price watch subscriptions stall but do not drop</text>
<text x="32"  y="2864" font-size="10" font-weight="600" fill="#085041">Recovery:</text>
<text x="195" y="2880" text-anchor="middle" font-size="10" fill="#0f6e56">1. LB routes to healthy Cart Service pods instantly</text>
<text x="195" y="2896" text-anchor="middle" font-size="10" fill="#0f6e56">2. K8s restarts crashed pod (&lt;30s)</text>
<text x="195" y="2912" text-anchor="middle" font-size="10" fill="#0f6e56">3. Client retries add-to-cart (idempotent on productId)</text>
<text x="195" y="2924" text-anchor="middle" font-size="9"  fill="#3b6d11">⚠ RTO: &lt;30s · Existing cart: never lost (Redis TTL 7d)</text>

<rect x="390" y="2736" width="350" height="196" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="565" y="2758" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">Redis Cart Store Down</text>
<text x="565" y="2776" text-anchor="middle" font-size="10" fill="#3b6d11">Root: node eviction / Sentinel failover lag / OOM</text>
<text x="402" y="2796" font-size="10" font-weight="600" fill="#27500a">Impact:</text>
<text x="565" y="2812" text-anchor="middle" font-size="10" fill="#3b6d11">Cart reads fail — all cart sessions unavailable</text>
<text x="565" y="2828" text-anchor="middle" font-size="10" fill="#3b6d11">Stock locks (SET NX) cannot be acquired</text>
<text x="565" y="2844" text-anchor="middle" font-size="10" fill="#3b6d11">Price cache gone — must hit PostgreSQL</text>
<text x="402" y="2864" font-size="10" font-weight="600" fill="#27500a">Recovery:</text>
<text x="565" y="2880" text-anchor="middle" font-size="10" fill="#3b6d11">1. Sentinel promotes Redis replica (&lt;15s)</text>
<text x="565" y="2896" text-anchor="middle" font-size="10" fill="#3b6d11">2. Cart data: read from PostgreSQL fallback table</text>
<text x="565" y="2912" text-anchor="middle" font-size="10" fill="#3b6d11">3. Stock locks: PostgreSQL advisory lock as fallback</text>
<text x="565" y="2924" text-anchor="middle" font-size="9"  fill="#3b6d11">⚠ RTO: &lt;15s · Checkout blocked until Redis recovers</text>

<rect x="20"  y="2948" width="350" height="196" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="195" y="2970" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Pricing Service / Price Cache Miss</text>
<text x="195" y="2988" text-anchor="middle" font-size="10" fill="#854f0b">Root: ML engine OOM / DB slow query / Flash sale spike</text>
<text x="32"  y="3008" font-size="10" font-weight="600" fill="#633806">Impact:</text>
<text x="195" y="3024" text-anchor="middle" font-size="10" fill="#854f0b">Cannot fetch live price for new add-to-cart</text>
<text x="195" y="3040" text-anchor="middle" font-size="10" fill="#854f0b">Checkout re-validation returns stale price</text>
<text x="195" y="3056" text-anchor="middle" font-size="10" fill="#854f0b">Price change events not published to Kafka</text>
<text x="32"  y="3076" font-size="10" font-weight="600" fill="#633806">Recovery:</text>
<text x="195" y="3092" text-anchor="middle" font-size="10" fill="#854f0b">1. CB opens → Redis cached price served (TTL 5min)</text>
<text x="195" y="3108" text-anchor="middle" font-size="10" fill="#854f0b">2. Show "Price may vary" banner on cart page</text>
<text x="195" y="3124" text-anchor="middle" font-size="10" fill="#854f0b">3. Checkout step: block until live price confirmed</text>
<text x="195" y="3136" text-anchor="middle" font-size="9"  fill="#ba7517">⚠ RTO: immediate (cache) · Checkout: safe-block</text>

<rect x="390" y="2948" width="350" height="196" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="565" y="2970" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Kafka Broker Crash</text>
<text x="565" y="2988" text-anchor="middle" font-size="10" fill="#534ab7">Root: disk full / broker OOM / network partition</text>
<text x="402" y="3008" font-size="10" font-weight="600" fill="#3c3489">Impact:</text>
<text x="565" y="3024" text-anchor="middle" font-size="10" fill="#534ab7">Price change events not published — cart not updated</text>
<text x="565" y="3040" text-anchor="middle" font-size="10" fill="#534ab7">cart-abandoned triggers not fired — no recovery emails</text>
<text x="565" y="3056" text-anchor="middle" font-size="10" fill="#534ab7">order-confirmed not fan-out — fulfilment delayed</text>
<text x="402" y="3076" font-size="10" font-weight="600" fill="#3c3489">Recovery:</text>
<text x="565" y="3092" text-anchor="middle" font-size="10" fill="#534ab7">1. ISR=3 replica elected as new leader (&lt;30s)</text>
<text x="565" y="3108" text-anchor="middle" font-size="10" fill="#534ab7">2. Producers buffer in memory; flush on reconnect</text>
<text x="565" y="3124" text-anchor="middle" font-size="10" fill="#534ab7">3. All events replayed from last committed offset</text>
<text x="565" y="3136" text-anchor="middle" font-size="9"  fill="#7f77dd">⚠ RTO: &lt;30s · RPO: 0 (ISR=3 guarantees durability)</text>

<!-- ── ROW 3: Inventory / Stock Lock | Checkout mid-flight crash ── -->
<rect x="20"  y="3160" width="350" height="212" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="195" y="3182" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Inventory Service / Stock Lock Failure</text>
<text x="195" y="3200" text-anchor="middle" font-size="10" fill="#534ab7">Root: Redis SET NX contention / DB pool exhausted</text>
<text x="32"  y="3220" font-size="10" font-weight="600" fill="#3c3489">Impact:</text>
<text x="195" y="3236" text-anchor="middle" font-size="10" fill="#534ab7">Cannot atomically reserve stock — oversell risk</text>
<text x="195" y="3252" text-anchor="middle" font-size="10" fill="#534ab7">Partial locks: some items reserved, others not</text>
<text x="195" y="3268" text-anchor="middle" font-size="10" fill="#534ab7">Checkout Service must rollback ALL partial locks</text>
<text x="32"  y="3288" font-size="10" font-weight="600" fill="#3c3489">Recovery (SAGA rollback):</text>
<text x="195" y="3304" text-anchor="middle" font-size="10" fill="#534ab7">1. Any lock failure → release ALL acquired locks (atomic)</text>
<text x="195" y="3320" text-anchor="middle" font-size="10" fill="#534ab7">2. Redis lock TTL (30s) auto-expires abandoned locks</text>
<text x="195" y="3336" text-anchor="middle" font-size="10" fill="#534ab7">3. Return "Item unavailable" — user retries checkout</text>
<text x="195" y="3352" text-anchor="middle" font-size="10" fill="#534ab7">4. PG advisory lock as fallback if Redis unavailable</text>
<text x="195" y="3364" text-anchor="middle" font-size="9"  fill="#7f77dd">⚠ RTO: immediate rollback · No phantom stock deduction</text>

<rect x="390" y="3160" width="350" height="212" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="565" y="3182" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">Checkout Service Crash Mid-Flow</text>
<text x="565" y="3200" text-anchor="middle" font-size="10" fill="#0f6e56">Root: Crash after stock lock but before payment</text>
<text x="402" y="3220" font-size="10" font-weight="600" fill="#085041">Impact:</text>
<text x="565" y="3236" text-anchor="middle" font-size="10" fill="#0f6e56">Stock reserved but payment not initiated</text>
<text x="565" y="3252" text-anchor="middle" font-size="10" fill="#0f6e56">Price lock active but order not created</text>
<text x="565" y="3268" text-anchor="middle" font-size="10" fill="#0f6e56">Rider stuck on "Processing…" — cart abandoned</text>
<text x="402" y="3288" font-size="10" font-weight="600" fill="#085041">Recovery (TTL-based auto-cleanup):</text>
<text x="565" y="3304" text-anchor="middle" font-size="10" fill="#0f6e56">1. Stock lock TTL = 30s → auto-released on expiry</text>
<text x="565" y="3320" text-anchor="middle" font-size="10" fill="#0f6e56">2. Price lock TTL = 10min → expires, cart → ACTIVE</text>
<text x="565" y="3336" text-anchor="middle" font-size="10" fill="#0f6e56">3. Kafka outbox: incomplete checkout → compensation event</text>
<text x="565" y="3352" text-anchor="middle" font-size="10" fill="#0f6e56">4. User shown "Session expired — please retry checkout"</text>
<text x="565" y="3364" text-anchor="middle" font-size="9"  fill="#3b6d11">⚠ RTO: 30s lock expiry · Cart fully restored, no loss</text>

<!-- ── ROW 4: Payment Service crash | PostgreSQL crash ── -->
<rect x="20"  y="3388" width="350" height="196" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="195" y="3410" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Payment Service / Gateway Crash</text>
<text x="195" y="3428" text-anchor="middle" font-size="10" fill="#185fa5">Root: Razorpay timeout / idempotency race / UPI outage</text>
<text x="32"  y="3448" font-size="10" font-weight="600" fill="#0c447c">Impact:</text>
<text x="195" y="3464" text-anchor="middle" font-size="10" fill="#185fa5">Rider charged but order not confirmed (worst case)</text>
<text x="195" y="3480" text-anchor="middle" font-size="10" fill="#185fa5">Or: charged, stock deducted, email not sent</text>
<text x="195" y="3496" text-anchor="middle" font-size="10" fill="#185fa5">Risk: double charge on client retry without idempotency</text>
<text x="32"  y="3516" font-size="10" font-weight="600" fill="#0c447c">Recovery (Fallback Chain):</text>
<text x="195" y="3532" text-anchor="middle" font-size="10" fill="#185fa5">1. orderId as idempotency key → no double charge ever</text>
<text x="195" y="3548" text-anchor="middle" font-size="10" fill="#185fa5">2. Primary PG fails → Secondary PG (PayU/CCAvenue)</text>
<text x="195" y="3564" text-anchor="middle" font-size="10" fill="#185fa5">3. Secondary fails → wallet deduction → Kafka async queue</text>
<text x="195" y="3576" text-anchor="middle" font-size="9"  fill="#185fa5">⚠ RTO: async · Stock released if all payment paths fail</text>

<rect x="390" y="3388" width="350" height="196" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="565" y="3410" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">PostgreSQL Down</text>
<text x="565" y="3428" text-anchor="middle" font-size="10" fill="#185fa5">Root: primary crash / disk full / slow query lock</text>
<text x="402" y="3448" font-size="10" font-weight="600" fill="#0c447c">Impact:</text>
<text x="565" y="3464" text-anchor="middle" font-size="10" fill="#185fa5">New orders cannot be persisted</text>
<text x="565" y="3480" text-anchor="middle" font-size="10" fill="#185fa5">Price history and inventory ledger unavailable</text>
<text x="565" y="3496" text-anchor="middle" font-size="10" fill="#185fa5">User accounts / coupon lookup fails</text>
<text x="402" y="3516" font-size="10" font-weight="600" fill="#0c447c">Recovery:</text>
<text x="565" y="3532" text-anchor="middle" font-size="10" fill="#185fa5">1. Aurora read replica promoted via failover (&lt;60s)</text>
<text x="565" y="3548" text-anchor="middle" font-size="10" fill="#185fa5">2. Orders queued in Kafka outbox; replayed on recovery</text>
<text x="565" y="3564" text-anchor="middle" font-size="10" fill="#185fa5">3. Cart reads: Redis (TTL 7d) covers the gap fully</text>
<text x="565" y="3576" text-anchor="middle" font-size="9"  fill="#185fa5">⚠ RTO: &lt;60s Aurora failover · RPO: 0 (Kafka outbox)</text>

<text x="380" y="3636" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— payment fallback chain (Chain of Responsibility) —</text>

<text x="97"  y="3672" text-anchor="middle" font-size="11" font-weight="700" fill="#3c3489">Primary PG</text>

<rect x="20"  y="4336" width="720" height="136" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="4358" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2c2a">Why a checkout crash never leaves the system in a broken half-state</text>

<rect x="32"  y="4372" width="210" height="88" rx="6" fill="#eaf3de" stroke="#3b6d11"/>
<text x="137" y="4392" text-anchor="middle" font-size="10" font-weight="700" fill="#27500a">Step 1 — Price Re-validate</text>
<text x="137" y="4410" text-anchor="middle" font-size="9" fill="#3b6d11">Crash here → nothing locked</text>
<text x="137" y="4426" text-anchor="middle" font-size="9" fill="#3b6d11">Cart stays ACTIVE; user retries</text>
<text x="137" y="4442" text-anchor="middle" font-size="9" fill="#3b6d11">No compensation needed</text>
<text x="137" y="4454" text-anchor="middle" font-size="9" fill="#3b6d11">Price re-read on next attempt</text>

<rect x="258" y="4372" width="210" height="88" rx="6" fill="#faeeda" stroke="#ba7517"/>
<text x="363" y="4392" text-anchor="middle" font-size="10" font-weight="700" fill="#633806">Step 2 — Stock Lock</text>
<text x="363" y="4410" text-anchor="middle" font-size="9" fill="#854f0b">Crash here → partial locks held</text>
<text x="363" y="4426" text-anchor="middle" font-size="9" fill="#854f0b">Redis TTL = 30s auto-releases</text>
<text x="363" y="4442" text-anchor="middle" font-size="9" fill="#854f0b">SAGA rollback: compensate</text>
<text x="363" y="4454" text-anchor="middle" font-size="9" fill="#854f0b">all acquired locks immediately</text>

<rect x="484" y="4372" width="216" height="88" rx="6" fill="#eedefe" stroke="#7f77dd"/>

<text x="592" y="4426" text-anchor="middle" font-size="9" fill="#534ab7">idempotency prevents double</text>
<text x="592" y="4442" text-anchor="middle" font-size="9" fill="#534ab7">Kafka event confirms order</text>
<text x="592" y="4454" text-anchor="middle" font-size="9" fill="#534ab7">Stock deducted on Kafka confirm</text>

<!-- ====== SECTION 12: 5 CRITICAL FALLBACK DECISIONS ====== -->
<line x1="40" y1="4532" x2="720" y2="4532" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="4524" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="20"  y="4540" width="720" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="4560" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Stock lock TTL is mandatory — orphaned locks must auto-expire</text>
<text x="380" y="4580" text-anchor="middle" font-size="11" fill="#0f6e56">Every Redis SET NX lock carries a 30-second TTL. If Checkout Service crashes after acquiring locks but before releasing them, the TTL ensures stock is not held hostage forever. Without TTL, a single crash permanently removes stock from the available pool — causing false "out of stock" for every subsequent buyer. TTL is the only safe default.</text>

<rect x="20"  y="4612" width="720" height="60" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="4632" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">2. Price must be re-validated at checkout — never trust priceAtAdd blindly</text>
<text x="380" y="4652" text-anchor="middle" font-size="11" fill="#854f0b">The price stored at add-to-cart time may be hours old. A flash sale could have ended, a pricing error corrected, or a legitimate surge applied. The Checkout Service always re-fetches live price and compares. Price drops are applied silently (good news). Price rises require re-confirmation. If Pricing Service is down, checkout is blocked — a stale price cannot be charged without validation.</text>

<rect x="20"  y="4684" width="720" height="60" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="4704" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">3. Payment uses orderId as idempotency key — never tripId or sessionId</text>
<text x="380" y="4724" text-anchor="middle" font-size="11" fill="#534ab7">If the payment gateway times out and the client retries, the exact same orderId is sent. The gateway deduplicates on orderId — the customer is never double-charged. This key is the same across all fallback levels: primary PG → secondary PG → wallet → Kafka queue. Without orderId idempotency, a network blip at payment time charges the card twice silently.</text>

<rect x="20"  y="4756" width="720" height="60" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="380" y="4776" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">4. Redis cart data is the source of truth during Redis availability — PG is the backup</text>
<text x="380" y="4796" text-anchor="middle" font-size="11" fill="#3b6d11">Cart sessions live in Redis (TTL 7d) for speed — 99% of all cart reads never touch PostgreSQL. But every cart mutation is also written to a PostgreSQL cart_backup table asynchronously via Kafka. If Redis is lost entirely, the cart is rebuilt from PostgreSQL on next login. User never sees an empty cart — at worst, they see a slightly stale version from the async write.</text>

<rect x="20"  y="4828" width="720" height="60" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="380" y="4848" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Checkout must fail safe — block on uncertainty, never proceed with unverified state</text>
<text x="380" y="4868" text-anchor="middle" font-size="11" fill="#993c1d">If Pricing Service, Inventory Service, or PostgreSQL is down during checkout, the safe default is to BLOCK the checkout and show "Please try again" — not to proceed with cached/unverified data. Unlike adding to cart (low-risk, idempotent), checkout involves money and stock deduction. A false checkout is infinitely worse than a blocked one. Conservative rejection protects both user and inventory.</text>

<!-- ── FINAL SUMMARY BOX ── -->
<rect x="20"  y="4904" width="720" height="60" rx="8" fill="#1e1208" stroke="#ba7517"/>
<text x="380" y="4926" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Cart data survives any single service crash. Stock locks auto-expire. Payment is idempotent on orderId. Checkout blocks on uncertainty — never proceeds blind.</text>
<text x="380" y="4946" text-anchor="middle" font-size="11" fill="#aaa">Recovery SLA: Cart Svc &lt;30s · Redis &lt;15s · Kafka &lt;30s · PostgreSQL &lt;60s · Stock locks auto-release at t=30s · Full DC &lt;2min</text>
