<text x="195" y="1758" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">Open Connect (Netflix's own CDN)</text>
<text x="195" y="1776" text-anchor="middle" font-size="11" fill="#534ab7">Netflix embeds hardware appliances inside ISPs</text>
<text x="195" y="1792" text-anchor="middle" font-size="11" fill="#534ab7">No public CDN (no Cloudfront/Akamai for video)</text>
<text x="195" y="1808" text-anchor="middle" font-size="11" fill="#534ab7">Pre-positions popular content during off-peak hours</text>
<text x="195" y="1824" text-anchor="middle" font-size="11" fill="#534ab7">Eliminates most inter-network traffic costs</text>

<rect x="390" y="1736" width="350" height="100" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="565" y="1758" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Personalised Thumbnail (A/B Test)</text>
<text x="565" y="1776" text-anchor="middle" font-size="11" fill="#854f0b">Same movie → different artwork per user</text>
<text x="565" y="1792" text-anchor="middle" font-size="11" fill="#854f0b">Action fans see action scene thumbnail</text>
<text x="565" y="1808" text-anchor="middle" font-size="11" fill="#854f0b">Romance fans see romantic scene thumbnail</text>
<text x="565" y="1824" text-anchor="middle" font-size="11" fill="#854f0b">Tested via multi-armed bandit algorithm</text>
