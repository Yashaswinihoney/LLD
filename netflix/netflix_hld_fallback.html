<!-- ====== SECTION 6: 3-LAYER DEFENCE ====== -->
<line x1="40" y1="2328" x2="720" y2="2328" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="2320" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 3-layer defence (applied to every critical service) —</text>

<rect x="20"  y="2336" width="224" height="120" rx="8" fill="#1c0a0a" stroke="#993c1d"/>
<text x="132" y="2358" text-anchor="middle" font-size="12" font-weight="700" fill="#e50914">Layer 1 · Circuit Breaker</text>
<text x="132" y="2376" text-anchor="middle" font-size="10" fill="#cc6666">CLOSED → normal calls pass through</text>
<text x="132" y="2392" text-anchor="middle" font-size="10" fill="#cc6666">OPEN → calls fail-fast; return cached</text>
<text x="132" y="2408" text-anchor="middle" font-size="10" fill="#cc6666">response or graceful error instantly</text>
<text x="132" y="2424" text-anchor="middle" font-size="10" fill="#cc6666">HALF_OPEN → 1 probe; success=CLOSED</text>
<text x="132" y="2440" text-anchor="middle" font-size="10" fill="#cc6666">Threshold: 5 failures / 10s window</text>

<!-- ====== SECTION 11: ACTIVE STREAM RESILIENCE ====== -->
<line x1="40" y1="3940" x2="720" y2="3940" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="3932" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— active stream resilience (most critical path) —</text>

<text x="380" y="3970" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Why active streams survive almost any crash</text>

<!-- 3 pillars -->
<rect x="32"  y="3984" width="216" height="80" rx="6" fill="#1a1208" stroke="#ba7517"/>
<text x="140" y="4002" text-anchor="middle" font-size="10" font-weight="700" fill="#f0a500">Pre-fetched Buffer</text>
<text x="140" y="4018" text-anchor="middle" font-size="9" fill="#cc9900">Client always holds 3 future</text>
<text x="140" y="4032" text-anchor="middle" font-size="9" fill="#cc9900">segments (6–8 seconds) locally</text>
<text x="140" y="4046" text-anchor="middle" font-size="9" fill="#cc9900">Plays through any momentary</text>
<text x="140" y="4060" text-anchor="middle" font-size="9" fill="#cc9900">server blip transparently</text>

<rect x="272" y="3984" width="216" height="80" rx="6" fill="#0a1a0a" stroke="#3b6d11"/>
<text x="380" y="4002" text-anchor="middle" font-size="10" font-weight="700" fill="#60cc60">ABR Auto-Quality-Drop</text>
<text x="380" y="4018" text-anchor="middle" font-size="9" fill="#80aa80">Bandwidth degrades → client</text>
<text x="380" y="4032" text-anchor="middle" font-size="9" fill="#80aa80">automatically switches to lower</text>
<text x="380" y="4046" text-anchor="middle" font-size="9" fill="#80aa80">bitrate rendition in real-time</text>
<text x="380" y="4060" text-anchor="middle" font-size="9" fill="#80aa80">No pause — quality drops silently</text>

<rect x="512" y="3984" width="216" height="80" rx="6" fill="#1c0a0a" stroke="#993c1d"/>

<text x="620" y="4032" text-anchor="middle" font-size="9" fill="#cc6666">Client tries next URL on timeout</text>

<text x="620" y="4060" text-anchor="middle" font-size="9" fill="#cc6666">User sees buffering, not black screen</text>

<!-- ====== SECTION 12: 5 CRITICAL FALLBACK DECISIONS ====== -->
<line x1="40" y1="4148" x2="720" y2="4148" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="4140" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="20" y="4156" width="720" height="60" rx="8" fill="#0a1a0a" stroke="#3b6d11"/>
<text x="380" y="4178" text-anchor="middle" font-size="12" font-weight="700" fill="#60cc60">1. Active streams never touch the Playback Service after manifest is issued</text>
<text x="380" y="4198" text-anchor="middle" font-size="11" fill="#80aa80">Once the client has the .m3u8 manifest and starts buffering segments from CDN, the Playback Service is out of the loop. Segments come directly from Open Connect CDN. Any Playback Service crash has zero effect on in-progress streams — only new play requests are blocked.</text>

<rect x="20" y="4228" width="720" height="60" rx="8" fill="#1c0a0a" stroke="#993c1d"/>
<text x="380" y="4250" text-anchor="middle" font-size="12" font-weight="700" fill="#e50914">2. Subscription check must default to ALLOW for existing JWT — not block</text>
<text x="380" y="4270" text-anchor="middle" font-size="11" fill="#cc6666">When PostgreSQL is down, the subscription service CB opens. For a valid unexpired JWT, the safe default is to allow playback — the user proved entitlement at login. Blocking is worse: it breaks paying subscribers. New JWTs require DB; renewals wait. Allow-with-valid-token is the Netflix standard.</text>

<rect x="20" y="4300" width="720" height="60" rx="8" fill="#1a1208" stroke="#ba7517"/>
<text x="380" y="4322" text-anchor="middle" font-size="12" font-weight="700" fill="#f0a500">3. Continue-watching writes are fire-and-forget via Kafka — never block the stream</text>
<text x="380" y="4342" text-anchor="middle" font-size="11" fill="#cc9900">Watch-position saves are sent to Kafka asynchronously. If Cassandra or Redis is down, the Kafka event is buffered. The stream is never paused waiting for a position write. On recovery, Kafka replays to Cassandra. Worst case: user resumes from a slightly stale position, not the start.</text>

<rect x="20" y="4372" width="720" height="60" rx="8" fill="#0a0a1c" stroke="#534ab7"/>
<text x="380" y="4394" text-anchor="middle" font-size="12" font-weight="700" fill="#a090ff">4. Recommendation fallback must be instant — pre-computed, not generated on-demand</text>
<text x="380" y="4414" text-anchor="middle" font-size="11" fill="#9090cc">ML recommendations are computed offline (batch jobs every few hours) and stored in Redis per profile. When the ML engine is down, no generation is attempted — cached rows are served immediately. Cache miss → editorial top-10 by region. A blank home screen is never acceptable.</text>

<rect x="20" y="4444" width="720" height="60" rx="8" fill="#1a1208" stroke="#ba7517"/>
<text x="380" y="4466" text-anchor="middle" font-size="12" font-weight="700" fill="#f0a500">5. Idempotency on view-event writes — Kafka exactly-once prevents duplicate analytics</text>
<text x="380" y="4486" text-anchor="middle" font-size="11" fill="#cc9900">If Cassandra write fails and the event is retried from Kafka, a naive retry inflates view counts. Kafka transactions + Cassandra row-level idempotency key (profileId + contentId + timestamp bucket) ensure the same event is never double-counted even after a crash + replay cycle.</text>

<!-- ====== FINAL FALLBACK SUMMARY BOX ====== -->
<rect x="20" y="4524" width="720" height="60" rx="8" fill="#141414" stroke="#e50914"/>
<text x="380" y="4548" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Netflix streams to 280M subscribers simultaneously. A single service crash must never cause a black screen.</text>
<text x="380" y="4568" text-anchor="middle" font-size="11" fill="#aaaaaa">Pre-fetched CDN buffer + CB + stale-cache serve = active streams survive any single component failure. DB down → cached JWT + Redis → home still loads. Full DC loss → Route 53 failover in &lt;90s.</text>
