<text x="396" y="220" font-size="10" fill="#888">POST /sessions {gameType, playerIds[]}</text>

<text x="380" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Game Manager Service (Singleton)</text>
<text x="380" y="272" text-anchor="middle" font-size="11" fill="#0f6e56">Receives game type + player list</text>
<text x="380" y="288" text-anchor="middle" font-size="11" fill="#0f6e56">Calls GameFactory.create(type) → GameStrategy</text>
<text x="380" y="304" text-anchor="middle" font-size="11" fill="#0f6e56">Wraps in GameSession, stores in Redis + DB</text>

<line x1="380" y1="308" x2="380" y2="356" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- GAME FACTORY -->
<rect x="190" y="356" width="380" height="76" rx="8" fill="#faeeda" stroke="#ba7517"/>

<text x="380" y="396" text-anchor="middle" font-size="11" fill="#854f0b">Switch on GameType enum</text>
<text x="380" y="412" text-anchor="middle" font-size="11" fill="#854f0b">Returns correct GameStrategy implementation</text>
<text x="380" y="428" text-anchor="middle" font-size="11" fill="#854f0b">Caller (GameManager) never knows concrete type</text>

<text x="380" y="762" text-anchor="middle" font-size="11" fill="#3b6d11">sessionId → {gameType, boardState, currentPlayer, status}</text>
