<!-- ====== SECTION 15: 5 HARDEST DESIGN DECISIONS ====== -->
<line x1="30" y1="2908" x2="770" y2="2908" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2900" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2916" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2936" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Inventory reserve must be atomic — synchronized at item level, rolled back on any partial failure</text>
<text x="400" y="2954" text-anchor="middle" font-size="11" fill="#0f6e56">PlaceOrderCommand reserves ALL items first. If any item fails, ALL already-reserved items are released. No order with partial stock — either fully reserved or nothing. Concurrency: per-productId synchronized block prevents oversell.</text>

<rect x="30" y="2980" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="3000" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Payment fallback chain — COD is the ultimate fallback, never fail the order</text>
<text x="400" y="3018" text-anchor="middle" font-size="11" fill="#185fa5">PaymentHandler chain: Primary PG → Secondary PG → Amazon Wallet → COD. CB on Primary PG means 3 failures → OPEN → immediately skip to Secondary. This guarantees checkout never fully fails due to payment issues alone.</text>

<rect x="30" y="3044" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="3064" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Decorator for pricing — composable fee layers, never hardcoded totals</text>
<text x="400" y="3082" text-anchor="middle" font-size="11" fill="#854f0b">New fee types (EMI surcharge, subscription discount, coupon) wrap the existing chain without touching order logic. Each Decorator.calculate(qty) re-delegates down. Adding insurance = new TravelInsuranceDecorator wrapping the chain. Zero coupling.</text>

<rect x="30" y="3108" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="3128" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Circuit Breaker state must survive crashes — persisted to Redis, not only in memory</text>
<text x="400" y="3146" text-anchor="middle" font-size="11" fill="#534ab7">In-memory CB state is lost on pod crash. On graceful shutdown: CB state written to Redis. On startup: CB hydrated from Redis. Prevents a restarted pod from immediately hammering a still-struggling upstream service with a full load.</text>

<rect x="30" y="3172" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="3192" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Event sourcing — Kafka as the source of truth, not the DB write</text>
<text x="400" y="3210" text-anchor="middle" font-size="11" fill="#993c1d">If the order service crashes after Kafka publish but before DB write: replay from Kafka offset → re-derive state. Outbox pattern: DB write and Kafka publish in the same transaction using the transactional outbox table. Zero order loss on crash.</text>

<!-- FINAL BOX -->
<rect x="30" y="3236" width="740" height="56" rx="8" fill="#131921"/>
<text x="400" y="3256" text-anchor="middle" font-size="12" font-weight="700" fill="#ff9900">Amazon processes 66,000 orders per hour. Recovery SLA: &lt;60s for pod crash, &lt;2min for AZ failure. CB trip time: 200ms.</text>
<text x="400" y="3276" text-anchor="middle" font-size="11" fill="#aaa">3-layer defence (CB + Retry + Stale Cache) ensures user can always browse and checkout — even when primary services are degraded. No hard failure — always a fallback.</text>
