<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; background: #f9f9f7; padding: 24px; }
  svg { max-width: 820px; display: block; margin: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 760 1480" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534ab7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#d85a30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ====== SECTION 1: EVENT TRIGGER FLOW ====== -->
<text x="380" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#888">— event trigger flow —</text>

<!-- EVENT SOURCES -->
<rect x="20"  y="32" width="148" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="94"  y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Stock Service</text>
<text x="94"  y="68" text-anchor="middle" font-size="10" fill="#5f5e5a">Item back in stock</text>

<rect x="186" y="32" width="148" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="260" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Order Service</text>
<text x="260" y="68" text-anchor="middle" font-size="10" fill="#5f5e5a">Order placed / shipped</text>

<rect x="352" y="32" width="148" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="426" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Payment Service</text>
<text x="426" y="68" text-anchor="middle" font-size="10" fill="#5f5e5a">Payment success / fail</text>

<rect x="518" y="32" width="148" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="592" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Promo Service</text>
<text x="592" y="68" text-anchor="middle" font-size="10" fill="#5f5e5a">Discount / offer alert</text>

<!-- all publish to Kafka -->
<line x1="94"  y1="84" x2="240" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="260" y1="84" x2="300" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="426" y1="84" x2="420" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="592" y1="84" x2="520" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- KAFKA EVENT BUS -->
<rect x="180" y="140" width="400" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Kafka — notification-events topic</text>
<text x="380" y="180" text-anchor="middle" font-size="11" fill="#534ab7">Decouples producers from notification system</text>
<text x="380" y="196" text-anchor="middle" font-size="11" fill="#534ab7">Durable, replayable, at-least-once delivery</text>

<line x1="380" y1="204" x2="380" y2="240" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NOTIFICATION SERVICE CORE -->
<rect x="190" y="240" width="380" height="76" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Notification Service</text>
<text x="380" y="280" text-anchor="middle" font-size="11" fill="#0f6e56">Consumes Kafka events</text>
<text x="380" y="296" text-anchor="middle" font-size="11" fill="#0f6e56">Fetches subscriber list from User Preference DB</text>
<text x="380" y="312" text-anchor="middle" font-size="11" fill="#0f6e56">Applies rate limiting + DND rules per user</text>

<!-- ====== SECTION 2: PREFERENCE + DEDUP ====== -->
<line x1="40" y1="360" x2="720" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="352" text-anchor="middle" font-size="11" fill="#888">— preference check + deduplication —</text>

<line x1="380" y1="316" x2="380" y2="368" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- TWO PARALLEL CHECKS -->
<line x1="310" y1="388" x2="180" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="388" x2="580" y2="428" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="368" width="340" height="28" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="387" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Parallel checks before dispatch</text>

<!-- USER PREFERENCE -->
<rect x="40" y="428" width="240" height="76" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="160" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">User Preference Service</text>
<text x="160" y="468" text-anchor="middle" font-size="11" fill="#185fa5">Check opted-in channels</text>
<text x="160" y="484" text-anchor="middle" font-size="11" fill="#185fa5">Check DND hours (no alerts 11pm–7am)</text>
<text x="160" y="500" text-anchor="middle" font-size="11" fill="#185fa5">Check language / locale</text>

<!-- DEDUP SERVICE -->
<rect x="480" y="428" width="240" height="76" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="600" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Deduplication Service</text>
<text x="600" y="468" text-anchor="middle" font-size="11" fill="#185fa5">Redis: seen notif IDs per user</text>
<text x="600" y="484" text-anchor="middle" font-size="11" fill="#185fa5">Prevent duplicate sends on retry</text>
<text x="600" y="500" text-anchor="middle" font-size="11" fill="#185fa5">TTL: 24 hours per event</text>

<!-- fail paths -->
<line x1="160" y1="504" x2="80" y2="548" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="68" y="534" font-size="10" text-anchor="end" fill="#d85a30">opted out / DND</text>
<rect x="20" y="548" width="140" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="90" y="570" text-anchor="middle" font-size="11" font-weight="600" fill="#712b13">Drop notification</text>

<line x1="600" y1="504" x2="660" y2="548" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="668" y="534" font-size="10" fill="#d85a30">duplicate</text>
<rect x="600" y="548" width="140" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="670" y="570" text-anchor="middle" font-size="11" font-weight="600" fill="#712b13">Skip, idempotent</text>

<!-- merge back -->
<line x1="160" y1="504" x2="300" y2="556" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="600" y1="504" x2="460" y2="556" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- TEMPLATE SERVICE -->
<rect x="210" y="556" width="340" height="64" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="578" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Template Service</text>
<text x="380" y="596" text-anchor="middle" font-size="11" fill="#854f0b">Fetch template by event type + locale</text>
<text x="380" y="612" text-anchor="middle" font-size="11" fill="#854f0b">Render: "iPhone 15 is back in stock!"</text>

<line x1="380" y1="620" x2="380" y2="656" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ====== SECTION 3: DISPATCH FLOW ====== -->
<line x1="40" y1="652" x2="720" y2="652" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="644" text-anchor="middle" font-size="11" fill="#888">— channel dispatch flow —</text>

<!-- CHANNEL ROUTER -->
<rect x="210" y="660" width="340" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="682" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Channel Router</text>
<text x="380" y="700" text-anchor="middle" font-size="11" fill="#0f6e56">Fan-out to user's preferred channels</text>
<text x="380" y="716" text-anchor="middle" font-size="11" fill="#0f6e56">Each channel gets its own Kafka partition</text>

<!-- fan out to 4 channels -->
<line x1="270" y1="724" x2="100" y2="776" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="724" x2="260" y2="776" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="440" y1="724" x2="500" y2="776" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="724" x2="640" y2="776" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PUSH -->
<rect x="20"  y="776" width="160" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="100" y="798" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Push Worker</text>
<text x="100" y="816" text-anchor="middle" font-size="11" fill="#185fa5">FCM (Android)</text>
<text x="100" y="832" text-anchor="middle" font-size="11" fill="#185fa5">APNs (iOS)</text>

<!-- EMAIL -->
<rect x="190" y="776" width="160" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="270" y="798" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Email Worker</text>
<text x="270" y="816" text-anchor="middle" font-size="11" fill="#185fa5">SendGrid / SES</text>
<text x="270" y="832" text-anchor="middle" font-size="11" fill="#185fa5">HTML templates</text>

<!-- SMS -->
<rect x="420" y="776" width="160" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="500" y="798" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">SMS Worker</text>
<text x="500" y="816" text-anchor="middle" font-size="11" fill="#185fa5">Twilio / Exotel</text>
<text x="500" y="832" text-anchor="middle" font-size="11" fill="#185fa5">Plain text only</text>

<!-- IN-APP -->
<rect x="590" y="776" width="160" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="670" y="798" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">In-App Worker</text>
<text x="670" y="816" text-anchor="middle" font-size="11" fill="#185fa5">WebSocket push</text>
<text x="670" y="832" text-anchor="middle" font-size="11" fill="#185fa5">Notification bell</text>

<!-- ====== SECTION 4: RETRY + TRACKING ====== -->
<line x1="40" y1="896" x2="720" y2="896" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="888" text-anchor="middle" font-size="11" fill="#888">— retry + delivery tracking flow —</text>

<!-- delivery success / fail -->
<line x1="100" y1="840" x2="200" y2="904" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="270" y1="840" x2="300" y2="904" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="500" y1="840" x2="440" y2="904" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="670" y1="840" x2="560" y2="904" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="180" y="904" width="380" height="64" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="370" y="926" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Delivery Status Tracker</text>
<text x="370" y="944" text-anchor="middle" font-size="11" fill="#854f0b">Write SENT / DELIVERED / FAILED to DB</text>
<text x="370" y="960" text-anchor="middle" font-size="11" fill="#854f0b">Webhook callbacks from FCM / SendGrid</text>

<!-- fail path: retry queue -->
<line x1="370" y1="968" x2="200" y2="1016" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="188" y="998" font-size="10" text-anchor="end" fill="#d85a30">delivery failed</text>

<rect x="60" y="1016" width="260" height="64" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="190" y="1038" text-anchor="middle" font-size="12" font-weight="600" fill="#712b13">Retry Queue (Kafka DLQ)</text>
<text x="190" y="1056" text-anchor="middle" font-size="11" fill="#993c1d">Exponential backoff: 1m → 5m → 30m</text>
<text x="190" y="1072" text-anchor="middle" font-size="11" fill="#993c1d">Max 3 retries then mark FAILED</text>

<!-- retry loops back -->
<path d="M60 1048 Q20 1048 20 840 Q20 724 210 700" fill="none" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="10" y="870" font-size="10" fill="#d85a30" transform="rotate(-90 10 870)">retry</text>

<!-- success path -->
<line x1="480" y1="968" x2="540" y2="1016" stroke="#0f6e56" stroke-width="1" marker-end="url(#arrow-g)"/>
<text x="548" y="998" font-size="10" fill="#0f6e56">delivered</text>

<rect x="460" y="1016" width="260" height="64" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="590" y="1038" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Analytics Service</text>
<text x="590" y="1056" text-anchor="middle" font-size="11" fill="#3b6d11">CTR, open rates, channel performance</text>
<text x="590" y="1072" text-anchor="middle" font-size="11" fill="#3b6d11">Feed back to preference tuning</text>

<!-- ====== SECTION 5: RATE LIMITER ====== -->
<line x1="40" y1="1120" x2="720" y2="1120" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1112" text-anchor="middle" font-size="11" fill="#888">— rate limiter (critical for scale) —</text>

<rect x="190" y="1128" width="380" height="76" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="1150" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Rate Limiter Service</text>
<text x="380" y="1168" text-anchor="middle" font-size="11" fill="#534ab7">Token bucket per user per channel</text>
<text x="380" y="1184" text-anchor="middle" font-size="11" fill="#534ab7">Max 5 push/day, 2 SMS/day, 10 email/day</text>
<text x="380" y="1200" text-anchor="middle" font-size="11" fill="#534ab7">Counts stored in Redis with daily TTL</text>

<!-- ====== DATA STORES ====== -->
<line x1="40" y1="1256" x2="720" y2="1256" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1248" text-anchor="middle" font-size="11" fill="#888">— key data stores —</text>

<rect x="20"  y="1264" width="148" height="64" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="94"  y="1286" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">Redis</text>
<text x="94"  y="1304" text-anchor="middle" font-size="10" fill="#3b6d11">Dedup IDs, rate limit</text>
<text x="94"  y="1320" text-anchor="middle" font-size="10" fill="#3b6d11">counters, DND flags</text>

<rect x="186" y="1264" width="148" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="260" y="1286" text-anchor="middle" font-size="11" font-weight="600" fill="#0c447c">PostgreSQL</text>
<text x="260" y="1304" text-anchor="middle" font-size="10" fill="#185fa5">User preferences,</text>
<text x="260" y="1320" text-anchor="middle" font-size="10" fill="#185fa5">delivery status logs</text>

<rect x="352" y="1264" width="148" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="426" y="1286" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">Kafka</text>
<text x="426" y="1304" text-anchor="middle" font-size="10" fill="#534ab7">Event bus, channel</text>
<text x="426" y="1320" text-anchor="middle" font-size="10" fill="#534ab7">queues, DLQ retries</text>

<rect x="518" y="1264" width="148" height="64" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="592" y="1286" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">Cassandra</text>
<text x="592" y="1304" text-anchor="middle" font-size="10" fill="#854f0b">Notification history,</text>
<text x="592" y="1320" text-anchor="middle" font-size="10" fill="#854f0b">analytics time-series</text>

</svg>
</body>
</html>
