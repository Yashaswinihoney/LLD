<text x="400" y="530" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">AbstractVotingProcessor.processVote() — 6-step skeleton</text>
<text x="400" y="548" text-anchor="middle" font-size="11" fill="#0f6e56">Step 1: authenticateVoter(voterId) — lookup in registeredVoters map</text>
<text x="400" y="564" text-anchor="middle" font-size="11" fill="#0f6e56">Step 2: checkEligibility(voter) — election open? already voted? disqualified?</text>
<text x="400" y="580" text-anchor="middle" font-size="11" fill="#0f6e56">Step 3: issueToken(voter) — one-time VoteToken (1hr TTL) issued</text>
<text x="400" y="596" text-anchor="middle" font-size="11" fill="#0f6e56">Step 4: getBallot(voter) — constituency-specific ballot returned</text>
<text x="400" y="608" text-anchor="middle" font-size="11" fill="#0f6e56">Step 5: CastVoteCommand.execute() — token consumed, vote recorded</text>

<text x="400" y="682" text-anchor="middle" font-size="13" font-weight="700" fill="#3c3489">VoteToken — Cryptographic Bridge</text>
<text x="400" y="700" text-anchor="middle" font-size="11" fill="#534ab7">Voter presents credentials → system issues random one-time VoteToken (UUID)</text>
<text x="400" y="716" text-anchor="middle" font-size="11" fill="#534ab7">Token is consumed on vote cast — SHA-256 hash of token stored on Voter object only</text>
<text x="400" y="732" text-anchor="middle" font-size="11" fill="#534ab7">Vote object stores only the token hash — never voter ID, name, or any PII</text>
<text x="400" y="748" text-anchor="middle" font-size="11" fill="#534ab7">Voter gets receipt hash = SHA-256(voteId + tokenHash) — verifies vote counted without revealing choice</text>

<text x="595" y="868" text-anchor="middle" font-size="10" fill="#3b6d11">Stored in encrypted vote ledger (separate DB)</text>

<text x="400" y="934" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">CastVoteCommand.execute()</text>
<text x="400" y="952" text-anchor="middle" font-size="11" fill="#854f0b">1. Ballot.isValidSelection(candidateIds) — FPTP: exactly 1; Ranked: all candidates ranked; Approval: ≤ maxSelections</text>
<text x="400" y="968" text-anchor="middle" font-size="11" fill="#854f0b">2. token.consume() — atomic single-use guard; returns false if already used or expired (TTL)</text>
<text x="400" y="984" text-anchor="middle" font-size="11" fill="#854f0b">3. vote.markCast() → voteStore.add(vote) → voter.markVoted(tokenHash)</text>
<text x="400" y="1000" text-anchor="middle" font-size="11" fill="#854f0b">4. undo() available for ADMIN recovery only — voids vote and removes from store</text>

<!-- Three strategy lanes -->
<rect x="20"  y="1300" width="234" height="148" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="137" y="1320" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">First Past The Post</text>
<text x="137" y="1338" text-anchor="middle" font-size="10" fill="#0f6e56">Each voter picks exactly 1 candidate</text>
<text x="137" y="1354" text-anchor="middle" font-size="10" fill="#0f6e56">Candidate with most votes wins</text>
<text x="137" y="1370" text-anchor="middle" font-size="10" fill="#0f6e56">Simple majority — no threshold</text>
<text x="137" y="1386" text-anchor="middle" font-size="10" fill="#0f6e56">O(n) counting pass</text>
<text x="137" y="1402" text-anchor="middle" font-size="10" fill="#0f6e56">Used for: general elections</text>
<text x="137" y="1418" text-anchor="middle" font-size="10" fill="#0f6e56">Risk: winner with minority share</text>
<text x="137" y="1434" text-anchor="middle" font-size="10" fill="#0f6e56">if 3+ candidates split vote</text>

<rect x="283" y="1300" width="234" height="148" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="1320" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Ranked Choice (IRV)</text>
<text x="400" y="1338" text-anchor="middle" font-size="10" fill="#534ab7">Voter ranks ALL candidates (1st, 2nd …)</text>
<text x="400" y="1354" text-anchor="middle" font-size="10" fill="#534ab7">Round 1: count first-choice votes</text>
<text x="400" y="1370" text-anchor="middle" font-size="10" fill="#534ab7">If no majority → eliminate last-place</text>
<text x="400" y="1386" text-anchor="middle" font-size="10" fill="#534ab7">Redistribute eliminated votes to next pref</text>
<text x="400" y="1402" text-anchor="middle" font-size="10" fill="#534ab7">Repeat until majority achieved</text>
<text x="400" y="1418" text-anchor="middle" font-size="10" fill="#534ab7">Used for: mayoral, presidential runoffs</text>
<text x="400" y="1434" text-anchor="middle" font-size="10" fill="#534ab7">Ensures winner has broad support</text>

<rect x="546" y="1300" width="234" height="148" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="663" y="1320" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Approval Voting</text>
<text x="663" y="1338" text-anchor="middle" font-size="10" fill="#854f0b">Voter approves any subset of candidates</text>
<text x="663" y="1354" text-anchor="middle" font-size="10" fill="#854f0b">No ranking — just approve / don't</text>
<text x="663" y="1370" text-anchor="middle" font-size="10" fill="#854f0b">Each approval = +1 to that candidate</text>
<text x="663" y="1386" text-anchor="middle" font-size="10" fill="#854f0b">Candidate with most approvals wins</text>
<text x="663" y="1402" text-anchor="middle" font-size="10" fill="#854f0b">Multi-seat: top N candidates elected</text>
<text x="663" y="1418" text-anchor="middle" font-size="10" fill="#854f0b">Used for: board elections, polls</text>

<line x1="30" y1="1796" x2="770" y2="1796" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1788" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— security measures &amp; attack mitigations —</text>

<rect x="20"  y="1804" width="232" height="148" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="136" y="1824" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">Identity Attacks</text>
<text x="136" y="1842" text-anchor="middle" font-size="10" fill="#993c1d">Double vote: token single-use + voter.hasVoted()</text>
<text x="136" y="1858" text-anchor="middle" font-size="10" fill="#993c1d">Impersonation: SHA-256 national ID + biometric</text>
<text x="136" y="1874" text-anchor="middle" font-size="10" fill="#993c1d">Ghost voter: dedup on ID hash at registration</text>
<text x="136" y="1890" text-anchor="middle" font-size="10" fill="#993c1d">Token replay: 1hr TTL + consumed flag</text>
<text x="136" y="1906" text-anchor="middle" font-size="10" fill="#993c1d">Voter coercion: anonymous vote (receipt</text>
<text x="136" y="1920" text-anchor="middle" font-size="10" fill="#993c1d">proves counted, not WHO you voted for)</text>
<text x="136" y="1936" text-anchor="middle" font-size="10" fill="#993c1d">Disqualification: admin + audit trail</text>

<rect x="284" y="1804" width="232" height="148" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="1824" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">Ballot Attacks</text>
<text x="400" y="1842" text-anchor="middle" font-size="10" fill="#993c1d">Invalid candidate: Ballot.isValidSelection()</text>
<text x="400" y="1858" text-anchor="middle" font-size="10" fill="#993c1d">Wrong format: FPTP=1, RCV=all ranked,</text>
<text x="400" y="1874" text-anchor="middle" font-size="10" fill="#993c1d">Approval=≤maxSelections strictly enforced</text>
<text x="400" y="1890" text-anchor="middle" font-size="10" fill="#993c1d">Cross-constituency: ballot scoped per</text>
<text x="400" y="1906" text-anchor="middle" font-size="10" fill="#993c1d">constituency — voter only gets their ballot</text>
<text x="400" y="1922" text-anchor="middle" font-size="10" fill="#993c1d">Null ballot: zero selections rejected</text>
<text x="400" y="1936" text-anchor="middle" font-size="10" fill="#993c1d">Late vote: ELECTION_NOT_OPEN check</text>

<rect x="548" y="1804" width="232" height="148" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="664" y="1824" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">System Attacks</text>
<text x="664" y="1842" text-anchor="middle" font-size="10" fill="#993c1d">Audit tampering: hash-chained log</text>
<text x="664" y="1858" text-anchor="middle" font-size="10" fill="#993c1d">Vote modification: immutable Vote object</text>
<text x="664" y="1874" text-anchor="middle" font-size="10" fill="#993c1d">(all fields final; status only forward)</text>
<text x="664" y="1890" text-anchor="middle" font-size="10" fill="#993c1d">Mass injection: FraudDetector rate alert</text>
<text x="664" y="1906" text-anchor="middle" font-size="10" fill="#993c1d">Admin abuse: undo() logged + audit</text>
<text x="664" y="1922" text-anchor="middle" font-size="10" fill="#993c1d">PII leak: national ID hashed on intake,</text>
<text x="664" y="1936" text-anchor="middle" font-size="10" fill="#993c1d">vote record stores NO voter identity</text>

<text x="400" y="2452" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— voter receipt verification (post-election transparency) —</text>

<text x="130" y="2532" text-anchor="middle" font-size="10" fill="#185fa5">Unique to this vote only</text>

<line x1="240" y1="2504" x2="270" y2="2504" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="270" y="2468" width="260" height="72" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="400" y="2488" text-anchor="middle" font-size="11" font-weight="700" fill="#27500a">Public verification portal</text>
<text x="400" y="2504" text-anchor="middle" font-size="10" fill="#3b6d11">Enter receipt hash → confirm vote was counted</text>
<text x="400" y="2520" text-anchor="middle" font-size="10" fill="#3b6d11">Does NOT reveal which candidate was chosen</text>
<text x="400" y="2532" text-anchor="middle" font-size="10" fill="#3b6d11">Binary answer: COUNTED / NOT FOUND</text>

<line x1="530" y1="2504" x2="560" y2="2504" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<text x="670" y="2532" text-anchor="middle" font-size="10" fill="#0f6e56">choice remains secret always</text>

<!-- ====== SECTION 13: 5 HARDEST DESIGN DECISIONS ====== -->
<line x1="30" y1="2612" x2="770" y2="2612" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2604" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2620" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2640" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Vote anonymisation without losing verifiability</text>
<text x="400" y="2658" text-anchor="middle" font-size="11" fill="#0f6e56">VoteToken bridges identity → vote without storing the link. Voter gets receipt hash to verify counted. Vote stores only token hash — not voter ID. The token is destroyed after use. No join is possible between the two records.</text>

<rect x="30" y="2684" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2704" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Double-vote prevention without revealing identity</text>
<text x="400" y="2722" text-anchor="middle" font-size="11" fill="#185fa5">voter.hasVoted() checked BEFORE issuing token. Token is single-use (consumed flag + TTL). Voter registry records voteTokenHash — not the vote. All three checks must fail for a double vote to succeed.</text>

<rect x="30" y="2748" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2768" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Audit chain must be append-only — no UPDATE or DELETE ever</text>
<text x="400" y="2786" text-anchor="middle" font-size="11" fill="#854f0b">Each AuditEntry hashes its own content + previous entry hash. Any mutation breaks downstream hashes. DB schema has no UPDATE/DELETE grants. verifyChainIntegrity() re-derives every hash from GENESIS on demand.</text>

<rect x="30" y="2812" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2832" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Tally runs only after polls close — never expose live counts</text>
<text x="400" y="2850" text-anchor="middle" font-size="11" fill="#534ab7">Live counts can influence late voters (bandwagon/strategic voting). TallyStrategy.tally() gated behind VOTING_CLOSED status. Strategy pattern allows swapping FPTP → RCV → Approval without changing the counting gate logic.</text>

<rect x="30" y="2876" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2896" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Admin undo (CastVoteCommand.undo()) must be audited, not hidden</text>
<text x="400" y="2914" text-anchor="middle" font-size="11" fill="#993c1d">Technical errors may require voiding a vote (e.g. system crash mid-cast). undo() voids and removes from store — but AuditLogger records it. Without this: silent deletion. With audit: every void is transparent and challengeable.</text>

<!-- FINAL BOX -->
<rect x="30" y="2940" width="740" height="56" rx="8" fill="#1c1a2e"/>
<text x="400" y="2962" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">National elections process tens of millions of votes. Anonymisation and double-vote prevention are non-negotiable. Audit chain integrity is the legal record.</text>
<text x="400" y="2982" text-anchor="middle" font-size="11" fill="#aaa">Voter registry and vote ledger must be on physically separate databases. The only link is the one-way token hash — and even that reveals nothing about the vote itself.</text>
