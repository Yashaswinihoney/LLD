<!-- ====== SECTION 8: KEY INSIGHTS ====== -->
<line x1="30" y1="2040" x2="770" y2="2040" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2032" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2048" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2068" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Single-threaded matching per instrument</text>
<text x="400" y="2086" text-anchor="middle" font-size="11" fill="#0f6e56">One thread handles all orders for RELIANCE. No locks needed = microsecond latency. Multi-threaded with locks = contention = slow = wrong trade order.</text>

<rect x="30" y="2112" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2132" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Price-Time Priority in Order Book</text>
<text x="400" y="2150" text-anchor="middle" font-size="11" fill="#185fa5">Best price matched first. At same price: oldest order filled first (FIFO). TreeMap for O(log N) price lookup. Queue per price level for FIFO. This is SEBI-mandated.</text>

<rect x="30" y="2176" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2196" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Idempotency is critical — network retries must not place duplicate orders</text>
<text x="400" y="2214" text-anchor="middle" font-size="11" fill="#854f0b">Client sends unique idempotency key. Exchange checks Redis before processing. Same key = return existing order. Without this: double execution = massive financial loss.</text>

<rect x="30" y="2240" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2260" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Price in paise (integer), never float</text>
<text x="400" y="2278" text-anchor="middle" font-size="11" fill="#534ab7">₹2950.05 stored as 295005 paise. Float arithmetic: 0.1 + 0.2 = 0.30000000000000004. On crores of rupees this becomes real money. Every exchange uses integer arithmetic.</text>

<rect x="30" y="2304" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2324" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Kafka between Order Service and Matching Engine (not synchronous)</text>
<text x="400" y="2342" text-anchor="middle" font-size="11" fill="#993c1d">Decouples intake from processing. Kafka durably persists every order — matching engine crash = replay from offset = zero order loss. Sync call = tight coupling = cascading failures.</text>

<!-- FINAL BOX -->
<rect x="30" y="2372" width="740" height="56" rx="8" fill="#2c2c2a"/>
<text x="400" y="2394" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Zerodha processes 15 million orders/day. Matching engine latency: &lt;1ms. NSE peak: 1.5 lakh orders/second.</text>
<text x="400" y="2414" text-anchor="middle" font-size="11" fill="#aaa">The matching engine is always single-threaded per instrument. Everything else (API, risk, portfolio, market data) is distributed and scalable.</text>
