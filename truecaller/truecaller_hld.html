<!-- ====== SECTION 7: 5 HARDEST DECISIONS ====== -->
<line x1="30" y1="1884" x2="770" y2="1884" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="1876" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 5 hardest design decisions —</text>

<rect x="30" y="1892" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="1912" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Crowdsourced name — majority vote algorithm</text>
<text x="400" y="1930" text-anchor="middle" font-size="11" fill="#0f6e56">When N people save +91-9000-0001 as "Ravi Kumar" and M save it as "Ravi", the name with the most votes wins. Weighted by verifier trust score — new accounts count less. Batch Spark job recomputes names nightly.</text>

<rect x="30" y="1956" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="1976" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Lookup chain priority: personal contact &gt; business &gt; registered &gt; crowdsourced</text>
<text x="400" y="1994" text-anchor="middle" font-size="11" fill="#185fa5">Alice saved +91-XXX as "Swiggy Delivery" — that name overrides even Swiggy's official business profile. Personal context always wins. Implemented as Chain of Responsibility — first match stops the chain.</text>

<rect x="30" y="2020" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2040" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Spam score must be fast — Redis cache, recompute async on report</text>
<text x="400" y="2058" text-anchor="middle" font-size="11" fill="#854f0b">Spam score in Redis (sub-2ms). On new spam report: Kafka event → Spam Engine recomputes async → updates Redis. Caller ID lookup never waits for recomputation. Eventual consistency acceptable here.</text>

<rect x="30" y="2084" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2104" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Privacy by design — opt-out must propagate everywhere</text>
<text x="400" y="2122" text-anchor="middle" font-size="11" fill="#534ab7">When Alice opts out: remove from Elasticsearch index, set Redis flag, mark DB row. All three must be consistent. Kafka event drives fan-out. Future lookups serve number-only until cache TTL expires.</text>

<rect x="30" y="2148" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2168" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Contact sync privacy — numbers cannot be stored as plaintext</text>
<text x="400" y="2186" text-anchor="middle" font-size="11" fill="#993c1d">Contact book is uploaded as SHA-256(normalized_number). Only used for name crowdsourcing. The server cannot reverse the hash. If Alice's contacts are breached, attackers get hashes, not numbers.</text>

<!-- LLD vs HLD -->
