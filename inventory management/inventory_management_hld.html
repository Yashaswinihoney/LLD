<!-- ====== SECTION 8: CORE CHALLENGES ====== -->
<line x1="30" y1="2020" x2="770" y2="2020" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2012" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 5 hardest design decisions —</text>

<rect x="30" y="2028" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2048" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Preventing overselling — per-SKU distributed lock</text>
<text x="400" y="2066" text-anchor="middle" font-size="11" fill="#0f6e56">Redis SET NX (lock per SKU:warehouseId). Only one thread reserves at a time. Release lock after DB write confirmed. TTL = 30 min for reservation expiry.</text>

<rect x="30" y="2092" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2112" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Consistent locking for transfers (no deadlock)</text>
<text x="400" y="2130" text-anchor="middle" font-size="11" fill="#185fa5">Always acquire locks in alphabetical key order. Thread A: lock(APPL-IP15P:1), then lock(APPL-IP15P:2). Thread B same order → no deadlock possible.</text>

<rect x="30" y="2156" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2176" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Reservation TTL — unpaid orders don't hold stock forever</text>
<text x="400" y="2194" text-anchor="middle" font-size="11" fill="#854f0b">Redis reservation key has TTL = 30 minutes. Expired reservation → background job releases stock, notifies customer. Same pattern as BookMyShow seat lock.</text>

<rect x="30" y="2220" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2240" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. FEFO for perishables — First Expired First Out</text>
<text x="400" y="2258" text-anchor="middle" font-size="11" fill="#534ab7">Batches stored with expiry dates. Pick list generator always picks nearest-expiry batch first. Reduces spoilage. Critical for grocery, pharma, FMCG categories.</text>

<rect x="30" y="2284" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2304" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Reorder without a PO already in flight</text>
<text x="400" y="2322" text-anchor="middle" font-size="11" fill="#993c1d">Before creating a PO, check if one already exists (CONFIRMED or SHIPPED state). Otherwise low stock triggers multiple POs in quick succession → overstock on arrival.</text>

<text x="146" y="2430" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">Fixed Quantity</text>
<text x="146" y="2450" text-anchor="middle" font-size="11" fill="#3b6d11">Always order same qty</text>
<text x="146" y="2466" text-anchor="middle" font-size="11" fill="#3b6d11">Simple to implement</text>
<text x="146" y="2482" text-anchor="middle" font-size="11" fill="#3b6d11">✓ Predictable</text>
<text x="146" y="2498" text-anchor="middle" font-size="11" fill="#3b6d11">✗ Ignores demand patterns</text>
<text x="146" y="2514" text-anchor="middle" font-size="11" fill="#3b6d11">Use: stable products</text>

<rect x="284" y="2408" width="232" height="128" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2430" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">EOQ (Economic Order Qty)</text>
<text x="400" y="2450" text-anchor="middle" font-size="11" fill="#185fa5">√(2DS/H) minimises cost</text>
<text x="400" y="2466" text-anchor="middle" font-size="11" fill="#185fa5">Balances order + hold cost</text>
<text x="400" y="2482" text-anchor="middle" font-size="11" fill="#185fa5">✓ Cost-optimal</text>
<text x="400" y="2498" text-anchor="middle" font-size="11" fill="#185fa5">✗ Needs demand data</text>
<text x="400" y="2514" text-anchor="middle" font-size="11" fill="#185fa5">Use: electronics, apparel</text>
<text x="400" y="2530" text-anchor="middle" font-size="11" fill="#185fa5">(Flipkart, Amazon)</text>

<rect x="538" y="2408" width="232" height="128" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="654" y="2430" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">JIT (Just In Time)</text>
<text x="654" y="2450" text-anchor="middle" font-size="11" fill="#854f0b">Order only what's needed</text>
<text x="654" y="2466" text-anchor="middle" font-size="11" fill="#854f0b">Minimise holding cost</text>
<text x="654" y="2482" text-anchor="middle" font-size="11" fill="#854f0b">✓ Zero overstock</text>
<text x="654" y="2498" text-anchor="middle" font-size="11" fill="#854f0b">✗ Supplier must be reliable</text>
<text x="654" y="2514" text-anchor="middle" font-size="11" fill="#854f0b">Use: perishables, FMCG</text>
<text x="654" y="2530" text-anchor="middle" font-size="11" fill="#854f0b">(Swiggy Instamart, Blinkit)</text>

<!-- FINAL BOX -->
<rect x="30" y="2560" width="740" height="60" rx="8" fill="#2c2c2a"/>
<text x="400" y="2582" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">The core principle: available qty = total qty - reserved qty. Never sell what you don't have.</text>
<text x="400" y="2600" text-anchor="middle" font-size="11" fill="#aaa">Every operation that changes stock must be atomic (Redis lock) + durable (PostgreSQL write) + auditable (Kafka event).</text>
