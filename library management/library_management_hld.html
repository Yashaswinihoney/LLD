<!-- ====== SECTION 8: KEY DECISIONS ====== -->
<line x1="30" y1="2024" x2="770" y2="2024" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2016" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 5 hardest design decisions —</text>

<rect x="30" y="2032" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2052" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Book vs BookCopy — two separate entities</text>
<text x="400" y="2070" text-anchor="middle" font-size="11" fill="#0f6e56">Book = logical entity (title, ISBN, authors). BookCopy = physical instance (barcode, condition, location). One Book can have N copies. Availability is tracked at the copy level, not the book level.</text>

<rect x="30" y="2096" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2116" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Reservation queue — FIFO per bookId, not per copyId</text>
<text x="400" y="2134" text-anchor="middle" font-size="11" fill="#185fa5">Queue is for the book title, not a specific copy. When ANY copy of that book is returned, the head of the queue is assigned that copy. Copy is then reserved for 3 days — if not collected, it goes to the next in queue.</text>

<rect x="30" y="2160" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2180" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Fine accumulates on member, not on loan</text>
<text x="400" y="2198" text-anchor="middle" font-size="11" fill="#854f0b">Each loan computes fine on return. Fine added to member.outstandingFine. Loan records its own fineCharged for audit. Borrowing blocked if total outstanding &gt; threshold. Members can pay partially.</text>

<rect x="30" y="2224" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2244" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Renewal blocked if reservation queue exists for that book</text>
<text x="400" y="2262" text-anchor="middle" font-size="11" fill="#534ab7">Before renewing, check if any reservation exists for the same book. If yes — member cannot renew, must return so queued member can get it. This ensures fair access across all members.</text>

<rect x="30" y="2288" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2308" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Atomic copy availability update (prevent double-borrow)</text>
<text x="400" y="2326" text-anchor="middle" font-size="11" fill="#993c1d">Use DB-level optimistic lock (version column on book_copies) or SELECT FOR UPDATE. Two concurrent checkouts for the same copy → only one succeeds. Redis availability cache invalidated immediately after borrow.</text>

<!-- LLD vs HLD COMPARISON -->
<line x1="30" y1="2404" x2="770" y2="2404" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2396" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— LLD vs HLD comparison —</text>

<rect x="30"  y="2412" width="355" height="176" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="207" y="2434" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2c2a">LLD (In-Process)</text>
<text x="207" y="2454" text-anchor="middle" font-size="11" fill="#5f5e5a">Copy lock: synchronized(copyObj)</text>
<text x="207" y="2470" text-anchor="middle" font-size="11" fill="#5f5e5a">Availability: BookCopy.isAvailable field</text>
<text x="207" y="2486" text-anchor="middle" font-size="11" fill="#5f5e5a">Reservation queue: LinkedList in memory</text>
<text x="207" y="2502" text-anchor="middle" font-size="11" fill="#5f5e5a">Search: stream filter on in-memory map</text>
<text x="207" y="2518" text-anchor="middle" font-size="11" fill="#5f5e5a">Fine: computed at return time (Strategy)</text>
<text x="207" y="2534" text-anchor="middle" font-size="11" fill="#5f5e5a">Overdue: checked on each return call</text>
<text x="207" y="2550" text-anchor="middle" font-size="11" fill="#5f5e5a">Notifications: synchronous observer</text>
<text x="207" y="2570" text-anchor="middle" font-size="11" fill="#5f5e5a">Validation: CoR chain (in-process)</text>

<rect x="415" y="2412" width="355" height="176" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="592" y="2434" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">HLD (Distributed)</text>
<text x="592" y="2454" text-anchor="middle" font-size="11" fill="#0f6e56">Copy lock: SELECT FOR UPDATE / Redis NX</text>
<text x="592" y="2470" text-anchor="middle" font-size="11" fill="#0f6e56">Availability: Redis cache + PostgreSQL</text>
<text x="592" y="2486" text-anchor="middle" font-size="11" fill="#0f6e56">Reservation queue: Redis list per bookId</text>
<text x="592" y="2502" text-anchor="middle" font-size="11" fill="#0f6e56">Search: Elasticsearch + Redis cache</text>
<text x="592" y="2518" text-anchor="middle" font-size="11" fill="#0f6e56">Fine: cron job + Kafka overdue-events</text>
<text x="592" y="2534" text-anchor="middle" font-size="11" fill="#0f6e56">Overdue: nightly batch job scans DB</text>
<text x="592" y="2550" text-anchor="middle" font-size="11" fill="#0f6e56">Notifications: Kafka → Notif Service</text>
<text x="592" y="2570" text-anchor="middle" font-size="11" fill="#0f6e56">Validation: microservice API calls</text>

<!-- FINAL BOX -->
<rect x="30" y="2608" width="740" height="60" rx="8" fill="#2c2c2a"/>
<text x="400" y="2630" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Core principle: Book availability = (totalCopies − borrowedCopies − reservedCopies).</text>
<text x="400" y="2650" text-anchor="middle" font-size="11" fill="#aaa">Every borrow decrements it atomically. Every return increments it — unless a reservation queue exists, in which case the copy goes to the next member.</text>
