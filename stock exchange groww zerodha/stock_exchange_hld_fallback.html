<!-- ====== SECTION 8: KEY INSIGHTS ====== -->
<line x1="30" y1="2040" x2="770" y2="2040" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2032" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2048" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2068" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Single-threaded matching per instrument</text>
<text x="400" y="2086" text-anchor="middle" font-size="11" fill="#0f6e56">One thread handles all orders for RELIANCE. No locks needed = microsecond latency. Multi-threaded with locks = contention = slow = wrong trade order.</text>

<rect x="30" y="2112" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2132" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Price-Time Priority in Order Book</text>
<text x="400" y="2150" text-anchor="middle" font-size="11" fill="#185fa5">Best price matched first. At same price: oldest order filled first (FIFO). TreeMap for O(log N) price lookup. Queue per price level for FIFO. This is SEBI-mandated.</text>

<rect x="30" y="2176" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2196" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Idempotency is critical — network retries must not place duplicate orders</text>
<text x="400" y="2214" text-anchor="middle" font-size="11" fill="#854f0b">Client sends unique idempotency key. Exchange checks Redis before processing. Same key = return existing order. Without this: double execution = massive financial loss.</text>

<rect x="30" y="2240" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2260" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Price in paise (integer), never float</text>
<text x="400" y="2278" text-anchor="middle" font-size="11" fill="#534ab7">₹2950.05 stored as 295005 paise. Float arithmetic: 0.1 + 0.2 = 0.30000000000000004. On crores of rupees this becomes real money. Every exchange uses integer arithmetic.</text>

<rect x="30" y="2304" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2324" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Kafka between Order Service and Matching Engine (not synchronous)</text>
<text x="400" y="2342" text-anchor="middle" font-size="11" fill="#993c1d">Decouples intake from processing. Kafka durably persists every order — matching engine crash = replay from offset = zero order loss. Sync call = tight coupling = cascading failures.</text>

<!-- ====== SECTION 11: 3-LAYER DEFENCE OVERVIEW ====== -->
<line x1="30" y1="3016" x2="770" y2="3016" stroke="#555" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="3008" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 3-layer defence (applied to every critical service) —</text>

<!-- Layer 1 -->
<rect x="20"  y="3024" width="234" height="112" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="137" y="3044" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">Layer 1 — Circuit Breaker</text>
<text x="137" y="3062" text-anchor="middle" font-size="10" fill="#993c1d">CLOSED: normal operation</text>
<text x="137" y="3078" text-anchor="middle" font-size="10" fill="#993c1d">OPEN: N failures → block all calls</text>
<text x="137" y="3094" text-anchor="middle" font-size="10" fill="#993c1d">instantly return cached fallback</text>
<text x="137" y="3110" text-anchor="middle" font-size="10" fill="#993c1d">HALF_OPEN: 1 probe after timeout</text>
<text x="137" y="3126" text-anchor="middle" font-size="10" fill="#993c1d">success → CLOSED | fail → OPEN</text>

<!-- Layer 2 -->
<rect x="283" y="3024" width="234" height="112" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="3044" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Layer 2 — Kafka Replay</text>
<text x="400" y="3062" text-anchor="middle" font-size="10" fill="#185fa5">Every order, trade, settlement event</text>
<text x="400" y="3078" text-anchor="middle" font-size="10" fill="#185fa5">durably persisted to Kafka before</text>
<text x="400" y="3094" text-anchor="middle" font-size="10" fill="#185fa5">any in-memory processing occurs</text>
<text x="400" y="3110" text-anchor="middle" font-size="10" fill="#185fa5">crash = consumer restarts from</text>
<text x="400" y="3126" text-anchor="middle" font-size="10" fill="#185fa5">last committed offset → zero loss</text>

<!-- Layer 3 -->
<rect x="546" y="3024" width="234" height="112" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="663" y="3044" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">Layer 3 — Stale Cache / Degrade</text>
<text x="663" y="3062" text-anchor="middle" font-size="10" fill="#0f6e56">Redis serves last-known LTP, depth</text>
<text x="663" y="3078" text-anchor="middle" font-size="10" fill="#0f6e56">and margin snapshot when live</text>
<text x="663" y="3094" text-anchor="middle" font-size="10" fill="#0f6e56">service is unreachable</text>
<text x="663" y="3110" text-anchor="middle" font-size="10" fill="#0f6e56">Read-only degraded mode: view</text>
<text x="663" y="3126" text-anchor="middle" font-size="10" fill="#0f6e56">portfolio + charts; no new orders</text>

<!-- ── BOX 1: MATCHING ENGINE CRASH ── -->
<rect x="20" y="3456" width="370" height="188" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="205" y="3478" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">Matching Engine Crash</text>
<text x="205" y="3498" text-anchor="middle" font-size="10" fill="#854f0b">Root cause: JVM OOM, hardware fault, process kill</text>
<text x="205" y="3516" text-anchor="middle" font-size="10" font-weight="600" fill="#712b13">Immediate impact:</text>
<text x="205" y="3532" text-anchor="middle" font-size="10" fill="#854f0b">Orders in executor queue are buffered in Kafka</text>
<text x="205" y="3548" text-anchor="middle" font-size="10" fill="#854f0b">In-memory order book state is LOST</text>

<text x="205" y="3614" text-anchor="middle" font-size="10" fill="#854f0b">2. Replay Kafka order-events from last committed offset</text>
<text x="205" y="3630" text-anchor="middle" font-size="10" fill="#854f0b">3. Reconstruct in-memory order book from replay</text>

<!-- ====== SECTION 16: 5 CRITICAL FALLBACK DESIGN DECISIONS ====== -->
<line x1="30" y1="4568" x2="770" y2="4568" stroke="#555" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="4560" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="30" y="4576" width="740" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="4596" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Kafka offset commit AFTER order book update — never before</text>
<text x="400" y="4614" text-anchor="middle" font-size="11" fill="#0f6e56">If Kafka offset is committed before the order book is updated and the engine crashes mid-update, the order is silently lost. Committing AFTER guarantees replay always reconstructs the full state. At-least-once delivery with idempotency key handles the duplicate-on-replay case.</text>

<rect x="30" y="4644" width="740" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="4664" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Margin fallback must be CONSERVATIVE — reject, not optimistically allow</text>
<text x="400" y="4682" text-anchor="middle" font-size="11" fill="#185fa5">When Portfolio Service is down, the safe default is to BLOCK all new orders, not allow them with unchecked margin. An optimistic allow risks over-leveraged positions that cannot be unwound. Financial risk = system risk. Conservative rejection is always the safer default in stock trading.</text>

<rect x="30" y="4712" width="740" height="56" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="4732" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Circuit Breaker state must survive pod restarts — persisted to Redis, not in-memory only</text>
<text x="400" y="4750" text-anchor="middle" font-size="11" fill="#854f0b">An in-memory CB resets to CLOSED on restart. A crashed pod restarts and immediately hammers the still-sick upstream service with full load. CB state written to Redis on every transition means a restarted pod inherits the OPEN state and respects the recovery window.</text>

<rect x="30" y="4780" width="740" height="56" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="4800" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Idempotency key stored in BOTH Redis and PostgreSQL</text>
<text x="400" y="4818" text-anchor="middle" font-size="11" fill="#534ab7">Redis alone: if Redis crashes, the idempotency key is gone → duplicate order on client retry. PostgreSQL alone: too slow for microsecond-latency check. Solution: write to Redis first (fast path), write to PG async. On Redis miss, fall back to PG. No duplicate regardless of which store is down.</text>

<rect x="30" y="4848" width="740" height="56" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="4868" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Single-threaded matching engine cannot be replicated — only one active instance per instrument</text>
<text x="400" y="4886" text-anchor="middle" font-size="11" fill="#993c1d">Running two matching engine instances for RELIANCE would produce conflicting order books. Recovery is sequential: crash → Kafka replay → single new instance. No active-active replication. The tradeoff: ~60s downtime per instrument on crash is acceptable vs the risk of split-brain matching producing illegal trades.</text>

<!-- ====== FINAL FALLBACK SUMMARY BOX ====== -->
<rect x="30" y="4920" width="740" height="56" rx="8" fill="#1a1208"/>
<text x="400" y="4942" text-anchor="middle" font-size="12" font-weight="700" fill="#f0a500">SEBI mandates: no order loss, no duplicate trade, full audit trail. Kafka + idempotency + conservative margin default satisfy all three.</text>
<text x="400" y="4962" text-anchor="middle" font-size="11" fill="#aaa">Recovery SLA: Matching engine ≤60s · Kafka broker ≤30s · Redis ≤15s · Order Service ≤30s · Market Data ≤20s</text>
