<text x="132" y="1326" text-anchor="middle" font-size="10" fill="#993c1d">CLOSED → calls pass normally</text>
<text x="132" y="1342" text-anchor="middle" font-size="10" fill="#993c1d">OPEN → ≥5 failures / 10s window</text>
<text x="132" y="1358" text-anchor="middle" font-size="10" fill="#993c1d">→ fail-fast; return cached response</text>
<text x="132" y="1374" text-anchor="middle" font-size="10" fill="#993c1d">HALF_OPEN → 1 probe after 30s</text>
<text x="132" y="1390" text-anchor="middle" font-size="10" fill="#993c1d">success → CLOSED · fail → OPEN</text>
<text x="132" y="1406" text-anchor="middle" font-size="10" fill="#993c1d">On: Matching · ETA · Payment · GPS</text>

<rect x="268" y="1286" width="224" height="128" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="1308" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Layer 2 · Stale Cache</text>
<text x="380" y="1326" text-anchor="middle" font-size="10" fill="#185fa5">Redis holds last-known driver</text>
<text x="380" y="1342" text-anchor="middle" font-size="10" fill="#185fa5">locations (GeoHash, TTL 30s)</text>
<text x="380" y="1358" text-anchor="middle" font-size="10" fill="#185fa5">Surge multiplier cached (TTL 1min)</text>
<text x="380" y="1374" text-anchor="middle" font-size="10" fill="#185fa5">ETA estimates cached per corridor</text>
<text x="380" y="1390" text-anchor="middle" font-size="10" fill="#185fa5">Rider app shows stale positions</text>
<text x="380" y="1406" text-anchor="middle" font-size="10" fill="#185fa5">with "updating…" indicator</text>

<rect x="516" y="1286" width="224" height="128" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="628" y="1308" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">Layer 3 · Graceful Degrade</text>
<text x="628" y="1326" text-anchor="middle" font-size="10" fill="#3b6d11">No drivers found → widen radius</text>
<text x="628" y="1342" text-anchor="middle" font-size="10" fill="#3b6d11">or show "no cars available"</text>
<text x="628" y="1358" text-anchor="middle" font-size="10" fill="#3b6d11">Payment fails → retry chain</text>
<text x="628" y="1374" text-anchor="middle" font-size="10" fill="#3b6d11">(card → wallet → COD)</text>
<text x="628" y="1390" text-anchor="middle" font-size="10" fill="#3b6d11">GPS lost → last-known position</text>
<text x="628" y="1406" text-anchor="middle" font-size="10" fill="#3b6d11">+ dead-reckoning estimate</text>

<!-- ====== SECTION: 5 CRITICAL FALLBACK DECISIONS ====== -->
<line x1="40" y1="3492" x2="720" y2="3492" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="3484" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="20"  y="3500" width="720" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="3520" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Trip state lives in Kafka, not only PostgreSQL</text>
<text x="380" y="3540" text-anchor="middle" font-size="11" fill="#0f6e56">Every trip state transition (REQUESTED → ACCEPTED → IN_PROGRESS → COMPLETED) is published to Kafka before DB write. If PostgreSQL goes down mid-trip, the current state is reconstructed from the Kafka event log. Outbox pattern ensures DB write and Kafka publish happen in the same transaction — no split-brain trip state.</text>

<rect x="20"  y="3572" width="720" height="60" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="3592" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Payment charge must be idempotent — tripId is the idempotency key</text>
<text x="380" y="3612" text-anchor="middle" font-size="11" fill="#185fa5">Trip end triggers the charge. If the gateway times out and the client retries, the same tripId is sent. The payment gateway deduplicates on tripId — the rider is never double-charged. This works across all fallback levels: primary gateway, secondary, and the async Kafka queue. Without this, a network blip at trip end means double charges at scale.</text>

<rect x="20"  y="3644" width="720" height="60" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="3664" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Surge pricing must default to 1.0x on service failure — never block the booking</text>
<text x="380" y="3684" text-anchor="middle" font-size="11" fill="#854f0b">If the Pricing Service is down, the booking must still complete. The safe default is base fare (surge = 1.0x) served from cache. Showing an error instead of a price causes the rider to abandon the booking entirely — worse revenue outcome than a slight under-surge. Reconcile at settlement if a cached surge is materially wrong.</text>

<rect x="20"  y="3716" width="720" height="60" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="3736" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Driver location TTL is 30s — after that, treat as offline</text>
<text x="380" y="3756" text-anchor="middle" font-size="11" fill="#534ab7">Redis GeoHash entries have a 30-second TTL. If the driver app loses connectivity and stops streaming GPS, the entry expires and the driver is treated as unavailable. This prevents the matching engine from dispatching rides to a ghost driver. It also ensures the map shows a stale-data indicator after 30s rather than a frozen pin forever.</text>

<rect x="20"  y="3788" width="720" height="60" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="380" y="3808" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Ride request is idempotent — rider retry never creates duplicate trip</text>
<text x="380" y="3828" text-anchor="middle" font-size="11" fill="#993c1d">The rider app includes a request-scoped UUID in every POST /ride. The Ride Matching Service checks Redis for this UUID before creating a Trip record. Retry on 503 (matching service recovering) returns the existing trip, not a new one. Without this, a 3G blip at booking time creates two trips for the same ride — both drivers dispatch.</text>
