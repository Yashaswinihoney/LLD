<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; background: #f9f9f7; padding: 24px; }
  svg { max-width: 820px; display: block; margin: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 760 1280" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534ab7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===================== SECTION LABEL ===================== -->
<text x="380" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#888">— ride request flow —</text>

<!-- CLIENTS -->
<rect x="80"  y="32" width="180" height="48" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="170" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Rider App</text>
<text x="170" y="68" text-anchor="middle" font-size="11" fill="#5f5e5a">Requests ride</text>

<rect x="500" y="32" width="180" height="48" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="590" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Driver App</text>
<text x="590" y="68" text-anchor="middle" font-size="11" fill="#5f5e5a">Streams GPS location</text>

<!-- both hit API gateway -->
<line x1="170" y1="80" x2="280" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="590" y1="80" x2="480" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- API GATEWAY -->
<rect x="240" y="120" width="280" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">API Gateway</text>
<text x="380" y="158" text-anchor="middle" font-size="11" fill="#5f5e5a">Auth (JWT), rate limiting, routing</text>

<line x1="380" y1="172" x2="380" y2="204" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LOCATION SERVICE (always-on) -->
<rect x="500" y="172" width="220" height="52" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="610" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Location Service</text>
<text x="610" y="210" text-anchor="middle" font-size="11" fill="#3b6d11">Driver GPS → Redis GeoHash</text>

<!-- driver app streams to location service directly -->
<line x1="590" y1="80" x2="610" y2="172" stroke="#3b6d11" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-g)"/>
<text x="630" y="130" font-size="10" fill="#3b6d11">every 4s</text>

<!-- RIDE MATCHING SERVICE -->
<rect x="230" y="204" width="300" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Ride Matching Service</text>
<text x="380" y="244" text-anchor="middle" font-size="11" fill="#0f6e56">Find nearby drivers via GeoHash</text>
<text x="380" y="260" text-anchor="middle" font-size="11" fill="#0f6e56">Query Location Service (Redis)</text>

<!-- parallel calls -->
<line x1="310" y1="268" x2="150" y2="320" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="268" x2="380" y2="320" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="268" x2="610" y2="320" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="138" y="302" font-size="10" text-anchor="end" fill="#888">parallel</text>
<text x="356" y="302" font-size="10" fill="#888">parallel</text>
<text x="620" y="302" font-size="10" fill="#888">parallel</text>

<!-- ETA SERVICE -->
<rect x="40" y="320" width="180" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="130" y="342" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">ETA Service</text>
<text x="130" y="358" text-anchor="middle" font-size="11" fill="#185fa5">Maps API + routing</text>

<!-- PRICING SERVICE -->
<rect x="280" y="320" width="200" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="342" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Pricing Service</text>
<text x="380" y="358" text-anchor="middle" font-size="11" fill="#185fa5">Surge pricing + fare calc</text>

<!-- TRIP SERVICE -->
<rect x="530" y="320" width="180" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="620" y="342" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Trip Service</text>
<text x="620" y="358" text-anchor="middle" font-size="11" fill="#185fa5">Create trip record in DB</text>

<!-- all converge back -->
<line x1="130" y1="372" x2="300" y2="424" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="372" x2="380" y2="424" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="620" y1="372" x2="460" y2="424" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RESPONSE TO RIDER -->
<rect x="230" y="424" width="300" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="446" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Show fare + ETA to rider</text>
<text x="380" y="462" text-anchor="middle" font-size="11" fill="#0f6e56">Rider confirms booking</text>

<line x1="380" y1="476" x2="380" y2="508" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NOTIFICATION SERVICE -->
<rect x="230" y="508" width="300" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="530" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Notification Service</text>
<text x="380" y="548" text-anchor="middle" font-size="11" fill="#534ab7">Push to best-matched driver</text>
<text x="380" y="564" text-anchor="middle" font-size="11" fill="#534ab7">WebSocket / FCM</text>

<line x1="380" y1="572" x2="380" y2="604" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- DRIVER ACCEPTS -->
<rect x="250" y="604" width="260" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="626" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Driver accepts</text>
<text x="380" y="642" text-anchor="middle" font-size="11" fill="#854f0b">Trip state → IN_PROGRESS</text>

<!-- ===================== DIVIDER: LIVE TRIP ===================== -->
<line x1="40" y1="690" x2="720" y2="690" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="682" text-anchor="middle" font-size="11" fill="#888">— live trip tracking flow —</text>

<!-- DRIVER GPS STREAMING -->
<rect x="80" y="700" width="200" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="180" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#2c2c2a">Driver streams GPS</text>
<text x="180" y="738" text-anchor="middle" font-size="11" fill="#5f5e5a">WebSocket, every 4 seconds</text>

<line x1="280" y1="726" x2="340" y2="726" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LOCATION SERVICE UPDATE -->
<rect x="340" y="700" width="200" height="52" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="440" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Location Service</text>
<text x="440" y="738" text-anchor="middle" font-size="11" fill="#3b6d11">Update Redis GeoHash</text>

<line x1="540" y1="726" x2="600" y2="726" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RIDER APP LIVE MAP -->
<rect x="600" y="700" width="120" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="660" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#2c2c2a">Rider App</text>
<text x="660" y="738" text-anchor="middle" font-size="11" fill="#5f5e5a">Live map update</text>

<!-- ===================== DIVIDER: TRIP END ===================== -->
<line x1="40" y1="790" x2="720" y2="790" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="782" text-anchor="middle" font-size="11" fill="#888">— trip end + payment flow —</text>

<!-- TRIP ENDS -->
<rect x="260" y="800" width="240" height="48" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="820" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Driver ends trip</text>
<text x="380" y="836" text-anchor="middle" font-size="11" fill="#854f0b">Trip state → COMPLETED</text>

<line x1="380" y1="848" x2="380" y2="880" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PAYMENT SERVICE -->
<rect x="230" y="880" width="300" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="902" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Payment Service</text>
<text x="380" y="920" text-anchor="middle" font-size="11" fill="#534ab7">Charge rider (idempotent)</text>
<text x="380" y="936" text-anchor="middle" font-size="11" fill="#534ab7">Stripe / Razorpay gateway</text>

<!-- payment fans out -->
<line x1="310" y1="944" x2="160" y2="988" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="944" x2="600" y2="988" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="60"  y="988" width="200" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="160" y="1010" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Receipt to rider</text>
<text x="160" y="1026" text-anchor="middle" font-size="11" fill="#185fa5">Push + email notification</text>

<rect x="490" y="988" width="200" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="590" y="1010" text-anchor="middle" font-size="12" font-weight="600" fill="#0c447c">Payout to driver</text>
<text x="590" y="1026" text-anchor="middle" font-size="11" fill="#185fa5">Scheduled batch settlement</text>

<!-- ===================== DIVIDER: DATA STORES ===================== -->
<line x1="40" y1="1080" x2="720" y2="1080" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1072" text-anchor="middle" font-size="11" fill="#888">— key data stores —</text>

<rect x="40"  y="1090" width="150" height="52" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="115" y="1112" text-anchor="middle" font-size="11" font-weight="600" fill="#27500a">Redis</text>
<text x="115" y="1128" text-anchor="middle" font-size="10" fill="#3b6d11">Driver locations (GeoHash)</text>

<rect x="210" y="1090" width="150" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="285" y="1112" text-anchor="middle" font-size="11" font-weight="600" fill="#0c447c">PostgreSQL</text>
<text x="285" y="1128" text-anchor="middle" font-size="10" fill="#185fa5">Trips, users, payments</text>

<rect x="380" y="1090" width="150" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="455" y="1112" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">Kafka</text>
<text x="455" y="1128" text-anchor="middle" font-size="10" fill="#534ab7">Trip events, notifications</text>

<rect x="550" y="1090" width="170" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="635" y="1112" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">Cassandra</text>
<text x="635" y="1128" text-anchor="middle" font-size="10" fill="#854f0b">Location history, analytics</text>

</svg>
</body>
</html>
