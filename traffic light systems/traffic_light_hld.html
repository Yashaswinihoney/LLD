<!-- ====== SECTION 12: 5 HARDEST DESIGN DECISIONS ====== -->
<line x1="30" y1="2504" x2="770" y2="2504" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="400" y="2496" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 hardest design decisions —</text>

<rect x="30" y="2512" width="740" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="400" y="2532" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Single-threaded executor per intersection (not one global thread)</text>
<text x="400" y="2550" text-anchor="middle" font-size="11" fill="#0f6e56">Each intersection has its own single-threaded executor. Commands queue up and execute serially — no locks needed. Global thread = cross-intersection contention = timing errors.</text>

<rect x="30" y="2576" width="740" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="400" y="2596" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. Emergency preemption preempts the executor queue, not just the phase</text>
<text x="400" y="2614" text-anchor="middle" font-size="11" fill="#185fa5">triggerEmergency() submits to front of queue. If submitted normally it would wait behind a 30s green. Priority task injection ensures &lt;200ms response time to beacon detection.</text>

<rect x="30" y="2640" width="740" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="400" y="2660" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. Yellow duration is fixed — NEVER adaptive</text>
<text x="400" y="2678" text-anchor="middle" font-size="11" fill="#854f0b">Adaptive timing only applies to green. Yellow is always 3–5s (traffic engineering law — reaction time + braking distance). Shortening yellow causes red-light running. Lengthening wastes cycle time.</text>

<rect x="30" y="2704" width="740" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="400" y="2724" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Fail-safe: any bulb fault → FLASHING_RED (not OFF, not frozen GREEN)</text>
<text x="400" y="2742" text-anchor="middle" font-size="11" fill="#534ab7">Frozen green = head-on collisions. Off = ambiguous. Flashing red = treat as stop sign = universally understood. FaultDetector blocks any non-FLASHING_RED setColor() on a faulted head.</text>

<rect x="30" y="2768" width="740" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="400" y="2788" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. ALL_RED clearance between every phase — mandatory 2-second buffer</text>
<text x="400" y="2806" text-anchor="middle" font-size="11" fill="#993c1d">Direct NS_GREEN → EW_GREEN risks a slow NS vehicle still clearing the intersection when EW goes green. 2s all-red is the standard inter-green buffer (ITE guidelines). Never skip it.</text>

<!-- FINAL BOX -->
<rect x="30" y="2836" width="740" height="56" rx="8" fill="#1a1a18"/>
<text x="400" y="2858" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">A standard 4-way intersection completes a full cycle in ~72s. Emergency preemption responds in &lt;200ms. Adaptive timing reduces avg wait by 15–25%.</text>
<text x="400" y="2878" text-anchor="middle" font-size="11" fill="#aaa">Controller is single-threaded per intersection. Sensors, observers, TMC sync, and data logging are all on separate threads — only phase execution is serialised.</text>
