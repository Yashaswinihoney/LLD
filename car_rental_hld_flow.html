<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; background: #f9f9f7; padding: 24px; }
  svg { max-width: 820px; display: block; margin: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 760 1320" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534ab7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#d85a30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ====== SECTION 1: SEARCH FLOW ====== -->
<text x="380" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#888">— search flow —</text>

<!-- CLIENT -->
<rect x="280" y="32" width="200" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="54" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Mobile / Web Client</text>
<text x="380" y="70" text-anchor="middle" font-size="11" fill="#5f5e5a">Search cars by location + dates</text>

<line x1="380" y1="84" x2="380" y2="116" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="396" y="104" font-size="10" fill="#888">GET /search?city=Bangalore&type=CAR</text>

<!-- API GATEWAY -->
<rect x="250" y="116" width="260" height="52" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="380" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">API Gateway</text>
<text x="380" y="154" text-anchor="middle" font-size="11" fill="#5f5e5a">Auth (JWT), rate limiting, routing</text>

<line x1="380" y1="168" x2="380" y2="200" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- SEARCH SERVICE -->
<rect x="230" y="200" width="300" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Search Service</text>
<text x="380" y="240" text-anchor="middle" font-size="11" fill="#0f6e56">Find stores near location (pincode)</text>
<text x="380" y="256" text-anchor="middle" font-size="11" fill="#0f6e56">Check Redis cache first</text>

<!-- cache hit vs miss -->
<line x1="300" y1="264" x2="160" y2="312" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="460" y1="264" x2="580" y2="312" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<text x="148" y="294" font-size="10" text-anchor="end" fill="#888">cache hit</text>
<text x="588" y="294" font-size="10" fill="#888">cache miss</text>

<!-- REDIS CACHE -->
<rect x="50" y="312" width="190" height="52" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="145" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#27500a">Redis Cache</text>
<text x="145" y="350" text-anchor="middle" font-size="11" fill="#3b6d11">Available vehicles per store</text>

<!-- INVENTORY SERVICE -->
<rect x="490" y="312" width="220" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="600" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Inventory Service</text>
<text x="600" y="350" text-anchor="middle" font-size="11" fill="#0f6e56">Query Vehicle DB + update cache</text>

<!-- both merge back -->
<line x1="145" y1="364" x2="300" y2="412" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="600" y1="364" x2="460" y2="412" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RESULTS TO CLIENT -->
<rect x="240" y="412" width="280" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="380" y="434" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Return available vehicles</text>
<text x="380" y="450" text-anchor="middle" font-size="11" fill="#0f6e56">List with pricing + ETA</text>

<!-- ====== SECTION 2: BOOKING FLOW ====== -->
<line x1="40" y1="498" x2="720" y2="498" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="490" text-anchor="middle" font-size="11" fill="#888">— booking flow —</text>

<line x1="380" y1="464" x2="380" y2="508" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="396" y="488" font-size="10" fill="#888">POST /reserve</text>

<!-- RESERVATION SERVICE -->
<rect x="230" y="508" width="300" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="530" text-anchor="middle" font-size="13" font-weight="600" fill="#0c447c">Reservation Service</text>
<text x="380" y="548" text-anchor="middle" font-size="11" fill="#185fa5">Acquire distributed lock on vehicle</text>
<text x="380" y="564" text-anchor="middle" font-size="11" fill="#185fa5">Prevents double booking</text>

<!-- lock fail -->
<line x1="230" y1="540" x2="110" y2="590" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<text x="98" y="574" font-size="10" text-anchor="end" fill="#d85a30">lock taken</text>
<rect x="20" y="590" width="170" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="105" y="612" text-anchor="middle" font-size="12" font-weight="600" fill="#712b13">Vehicle unavailable</text>

<line x1="380" y1="572" x2="380" y2="608" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- TWO PHASE: lock + pay -->
<rect x="200" y="608" width="360" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Two-phase commit</text>
<text x="380" y="648" text-anchor="middle" font-size="11" fill="#534ab7">Phase 1: lock vehicle (Redis TTL 10 min)</text>
<text x="380" y="664" text-anchor="middle" font-size="11" fill="#534ab7">Phase 2: confirm on payment success</text>

<!-- parallel: pricing + payment -->
<line x1="310" y1="672" x2="160" y2="720" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="672" x2="600" y2="720" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PRICING SERVICE -->
<rect x="50" y="720" width="210" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="155" y="742" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Pricing Service</text>
<text x="155" y="758" text-anchor="middle" font-size="11" fill="#854f0b">Calculate: days × dailyRate</text>

<!-- PAYMENT SERVICE -->
<rect x="490" y="720" width="220" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="600" y="742" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">Payment Service</text>
<text x="600" y="758" text-anchor="middle" font-size="11" fill="#534ab7">Charge via Stripe (idempotent)</text>

<!-- payment fail -->
<line x1="600" y1="772" x2="600" y2="808" stroke="#d85a30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-r)"/>
<rect x="510" y="808" width="180" height="44" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="600" y="826" text-anchor="middle" font-size="12" font-weight="600" fill="#712b13">Release Redis lock</text>
<text x="600" y="840" text-anchor="middle" font-size="11" fill="#993c1d">Vehicle back to AVAILABLE</text>

<!-- payment success -->
<line x1="155" y1="772" x2="300" y2="820" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="756" x2="380" y2="820" stroke="#0f6e56" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-g)"/>
<text x="294" y="810" font-size="10" text-anchor="end" fill="#0f6e56">payment ok</text>

<!-- CONFIRM BOOKING -->
<rect x="220" y="820" width="280" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="360" y="842" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Confirm booking</text>
<text x="360" y="860" text-anchor="middle" font-size="11" fill="#0f6e56">Write Reservation to DB</text>
<text x="360" y="876" text-anchor="middle" font-size="11" fill="#0f6e56">Vehicle status → BUSY in DB + cache</text>

<line x1="360" y1="884" x2="360" y2="916" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NOTIFICATION + KAFKA -->
<rect x="220" y="916" width="280" height="64" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="360" y="938" text-anchor="middle" font-size="13" font-weight="600" fill="#3c3489">Notification Service (via Kafka)</text>
<text x="360" y="956" text-anchor="middle" font-size="11" fill="#534ab7">Email + Push confirmation to user</text>
<text x="360" y="972" text-anchor="middle" font-size="11" fill="#534ab7">Booking ID + pickup instructions</text>

<!-- ====== SECTION 3: RETURN FLOW ====== -->
<line x1="40" y1="1020" x2="720" y2="1020" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1012" text-anchor="middle" font-size="11" fill="#888">— vehicle return + billing flow —</text>

<rect x="250" y="1028" width="260" height="48" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="1048" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Store confirms vehicle return</text>
<text x="380" y="1064" text-anchor="middle" font-size="11" fill="#854f0b">POST /reservation/{id}/return</text>

<line x1="380" y1="1076" x2="380" y2="1108" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="1108" width="340" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="1130" text-anchor="middle" font-size="13" font-weight="600" fill="#0c447c">Billing Service</text>
<text x="380" y="1148" text-anchor="middle" font-size="11" fill="#185fa5">Calculate final bill (days × rate)</text>
<text x="380" y="1164" text-anchor="middle" font-size="11" fill="#185fa5">Apply late return penalty if any</text>

<line x1="310" y1="1172" x2="160" y2="1216" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="1172" x2="600" y2="1216" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="50" y="1216" width="210" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="155" y="1238" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Vehicle → AVAILABLE</text>
<text x="155" y="1254" text-anchor="middle" font-size="11" fill="#0f6e56">Update DB + Redis cache</text>

<rect x="490" y="1216" width="210" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="595" y="1238" text-anchor="middle" font-size="12" font-weight="600" fill="#3c3489">Final invoice to user</text>
<text x="595" y="1254" text-anchor="middle" font-size="11" fill="#534ab7">Email + push notification</text>

<!-- ====== DATA STORES ====== -->
<line x1="40" y1="1298" x2="720" y2="1298" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="1290" text-anchor="middle" font-size="11" fill="#888">— key data stores —</text>

<!-- removed data stores section to fit viewBox -->

</svg>
</body>
</html>
