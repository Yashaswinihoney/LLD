<line x1="30" y1="824" x2="750" y2="824" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="390" y="816" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— failure detection strategies —</text>

<rect x="30"  y="832" width="348" height="136" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="204" y="854" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Count-Based (Consecutive Failures)</text>
<text x="204" y="874" text-anchor="middle" font-size="11" fill="#534ab7">Count consecutive failures</text>
<text x="204" y="890" text-anchor="middle" font-size="11" fill="#534ab7">If consecutiveFailures ≥ N → OPEN</text>
<text x="204" y="906" text-anchor="middle" font-size="11" fill="#534ab7">Reset counter on every success</text>
<text x="204" y="922" text-anchor="middle" font-size="11" fill="#534ab7">Simple — reacts quickly to hard failures</text>
<text x="204" y="938" text-anchor="middle" font-size="11" fill="#534ab7">✓ Best for: payment, auth, DB calls</text>
<text x="204" y="960" text-anchor="middle" font-size="10" fill="#7f77dd">e.g. 3 consecutive failures → OPEN</text>

<rect x="402" y="832" width="348" height="136" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="576" y="854" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Rate-Based (Sliding Window)</text>
<text x="576" y="874" text-anchor="middle" font-size="11" fill="#534ab7">Track last N calls in circular buffer</text>
<text x="576" y="890" text-anchor="middle" font-size="11" fill="#534ab7">If failureRate% ≥ threshold → OPEN</text>
<text x="576" y="906" text-anchor="middle" font-size="11" fill="#534ab7">Window must fill before acting</text>
<text x="576" y="922" text-anchor="middle" font-size="11" fill="#534ab7">Tolerates occasional failures gracefully</text>
<text x="576" y="938" text-anchor="middle" font-size="11" fill="#534ab7">✓ Best for: notification, search, CDN</text>
<text x="576" y="960" text-anchor="middle" font-size="10" fill="#7f77dd">e.g. 6/10 calls fail (60%) → OPEN</text>

<!-- ====== SECTION 7: CASCADE FAILURE — WHY CB EXISTS ====== -->
<line x1="30" y1="1172" x2="750" y2="1172" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="390" y="1164" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— why circuit breaker exists: cascade failure without it —</text>

<rect x="30" y="1180" width="348" height="148" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="204" y="1202" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">Without Circuit Breaker ❌</text>
<text x="204" y="1222" text-anchor="middle" font-size="11" fill="#993c1d">Service A calls Service B (B is down)</text>
<text x="204" y="1238" text-anchor="middle" font-size="11" fill="#993c1d">A threads pile up waiting (3s timeout)</text>
<text x="204" y="1254" text-anchor="middle" font-size="11" fill="#993c1d">A's thread pool exhausted</text>
<text x="204" y="1270" text-anchor="middle" font-size="11" fill="#993c1d">A stops responding to all traffic</text>
<text x="204" y="1286" text-anchor="middle" font-size="11" fill="#993c1d">C (calling A) also exhausts threads</text>
<text x="204" y="1302" text-anchor="middle" font-size="11" fill="#993c1d">Full system outage from ONE failure</text>
<text x="204" y="1320" text-anchor="middle" font-size="11" fill="#993c1d">💀 Cascade collapse</text>

<rect x="402" y="1180" width="348" height="148" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="576" y="1202" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">With Circuit Breaker ✓</text>
<text x="576" y="1222" text-anchor="middle" font-size="11" fill="#3b6d11">Service A calls B (B is down)</text>
<text x="576" y="1238" text-anchor="middle" font-size="11" fill="#3b6d11">3 failures → CB opens</text>
<text x="576" y="1254" text-anchor="middle" font-size="11" fill="#3b6d11">All further calls to B rejected in &lt;1ms</text>
<text x="576" y="1270" text-anchor="middle" font-size="11" fill="#3b6d11">A's threads stay free</text>
<text x="576" y="1286" text-anchor="middle" font-size="11" fill="#3b6d11">A can serve other requests normally</text>
<text x="576" y="1302" text-anchor="middle" font-size="11" fill="#3b6d11">Fallback: serve cached / default response</text>
<text x="576" y="1320" text-anchor="middle" font-size="11" fill="#3b6d11">✅ Only B is affected, not the whole system</text>

<!-- ====== SECTION 8: CB + RETRY + FALLBACK TRIO ====== -->
<line x1="30" y1="1352" x2="750" y2="1352" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="390" y="1344" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the resilience trio: retry + circuit breaker + fallback —</text>

<rect x="30"  y="1360" width="216" height="128" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="138" y="1382" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">Retry</text>
<text x="138" y="1402" text-anchor="middle" font-size="11" fill="#185fa5">Transient errors</text>
<text x="138" y="1418" text-anchor="middle" font-size="11" fill="#185fa5">Exp backoff + jitter</text>
<text x="138" y="1434" text-anchor="middle" font-size="11" fill="#185fa5">Max 3 attempts</text>
<text x="138" y="1450" text-anchor="middle" font-size="11" fill="#185fa5">Skip if CB is OPEN</text>
<text x="138" y="1474" text-anchor="middle" font-size="10" fill="#185fa5">→ handles: blip, brief hiccup</text>

<rect x="282" y="1360" width="216" height="128" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="390" y="1382" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">Circuit Breaker</text>
<text x="390" y="1402" text-anchor="middle" font-size="11" fill="#534ab7">Sustained failures</text>
<text x="390" y="1418" text-anchor="middle" font-size="11" fill="#534ab7">Fast fail on OPEN</text>
<text x="390" y="1434" text-anchor="middle" font-size="11" fill="#534ab7">Auto-probe (HALF_OPEN)</text>
<text x="390" y="1450" text-anchor="middle" font-size="11" fill="#534ab7">Wraps all downstream</text>
<text x="390" y="1474" text-anchor="middle" font-size="10" fill="#534ab7">→ handles: outage, timeout storm</text>

<rect x="534" y="1360" width="216" height="128" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="642" y="1382" text-anchor="middle" font-size="12" font-weight="700" fill="#27500a">Fallback</text>
<text x="642" y="1402" text-anchor="middle" font-size="11" fill="#3b6d11">Degrade gracefully</text>
<text x="642" y="1418" text-anchor="middle" font-size="11" fill="#3b6d11">Serve stale cache</text>
<text x="642" y="1434" text-anchor="middle" font-size="11" fill="#3b6d11">Default response</text>
<text x="642" y="1450" text-anchor="middle" font-size="11" fill="#3b6d11">Feature flag off</text>
<text x="642" y="1474" text-anchor="middle" font-size="10" fill="#3b6d11">→ handles: user-facing impact</text>

<!-- ====== SECTION 9: KEY DESIGN DECISIONS ====== -->
<line x1="30" y1="1512" x2="750" y2="1512" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="390" y="1504" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— 5 key design decisions —</text>

<rect x="30" y="1520" width="720" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="390" y="1540" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Retry must NOT fire when circuit is OPEN</text>
<text x="390" y="1558" text-anchor="middle" font-size="11" fill="#0f6e56">Retry handles transient blips. CB handles sustained outages. Retry on an open circuit defeats the entire purpose — it would still hammer the downstream. When CB throws CircuitBreakerOpenException, the retry layer must recognise and skip.</text>

<rect x="30" y="1584" width="720" height="52" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="390" y="1604" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">2. State transitions must be atomic (compareAndSet)</text>
<text x="390" y="1622" text-anchor="middle" font-size="11" fill="#185fa5">Multiple threads may call execute() concurrently. Only one should trigger the CLOSED→OPEN transition. Use AtomicReference + compareAndSet — if it loses the race, the winner already transitioned. Without this, you get double-open events and corrupted metrics.</text>

<rect x="30" y="1648" width="720" height="52" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="390" y="1668" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">3. HALF_OPEN must allow exactly one probe at a time</text>
<text x="390" y="1686" text-anchor="middle" font-size="11" fill="#854f0b">AtomicInteger halfOpenCalls guards concurrent probes. Only 1 probe allowed — if two requests enter HALF_OPEN simultaneously and both fail, both would re-open but with doubled impact. The guard ensures only one determines the outcome.</text>

<rect x="30" y="1712" width="720" height="52" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="390" y="1732" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">4. Count-based vs Rate-based — choose per use case</text>
<text x="390" y="1750" text-anchor="middle" font-size="11" fill="#534ab7">Count-based: opens after N consecutive failures. Fast reaction. Use for critical paths (payment, auth). Rate-based: opens when failure% exceeds threshold over a window. Tolerates occasional errors. Use for non-critical (notification, search, analytics).</text>

<rect x="30" y="1776" width="720" height="52" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="390" y="1796" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">5. Call timeout is part of the CB — threads must not block forever</text>
<text x="390" y="1814" text-anchor="middle" font-size="11" fill="#993c1d">The CB wraps calls with a hard timeout (callTimeoutMs). If downstream hangs for 60s with no response, the thread is held for 60s — exhausting the thread pool is exactly what CB prevents. Timeout = failure. Future.get(timeout) releases the thread on expiry.</text>

<!-- ====== SECTION 10: LLD vs HLD ====== -->
<line x1="30" y1="1852" x2="750" y2="1852" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="390" y="1844" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— LLD vs HLD comparison —</text>

<rect x="30"  y="1860" width="345" height="180" rx="8" fill="#f1efe8" stroke="#888780"/>
<text x="202" y="1882" text-anchor="middle" font-size="12" font-weight="700" fill="#2c2c2a">LLD (In-Process, single service)</text>
<text x="202" y="1902" text-anchor="middle" font-size="11" fill="#5f5e5a">State: AtomicReference&lt;CircuitState&gt;</text>
<text x="202" y="1918" text-anchor="middle" font-size="11" fill="#5f5e5a">Metrics: CallMetrics circular buffer</text>
<text x="202" y="1934" text-anchor="middle" font-size="11" fill="#5f5e5a">Timeout: Future.get(callTimeoutMs)</text>
<text x="202" y="1950" text-anchor="middle" font-size="11" fill="#5f5e5a">Observers: synchronous method calls</text>
<text x="202" y="1966" text-anchor="middle" font-size="11" fill="#5f5e5a">Registry: Singleton in JVM</text>
<text x="202" y="1982" text-anchor="middle" font-size="11" fill="#5f5e5a">Scope: wraps one service per CB</text>
<text x="202" y="1998" text-anchor="middle" font-size="11" fill="#5f5e5a">Config: code / properties file</text>
<text x="202" y="2022" text-anchor="middle" font-size="11" fill="#5f5e5a">Libraries: Resilience4j, Hystrix</text>

<rect x="405" y="1860" width="345" height="180" rx="8" fill="#e1f5ee" stroke="#0f6e56"/>
<text x="577" y="1882" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">HLD (Distributed / sidecar)</text>
<text x="577" y="1902" text-anchor="middle" font-size="11" fill="#0f6e56">State: Redis per CB (shared across pods)</text>
<text x="577" y="1918" text-anchor="middle" font-size="11" fill="#0f6e56">Metrics: Prometheus counters</text>
<text x="577" y="1934" text-anchor="middle" font-size="11" fill="#0f6e56">Timeout: async call + timeout future</text>
<text x="577" y="1950" text-anchor="middle" font-size="11" fill="#0f6e56">Observers: Kafka → alert + dashboard</text>
<text x="577" y="1966" text-anchor="middle" font-size="11" fill="#0f6e56">Registry: service mesh (Istio/Envoy)</text>
<text x="577" y="1982" text-anchor="middle" font-size="11" fill="#0f6e56">Scope: sidecar proxy wraps all traffic</text>
<text x="577" y="1998" text-anchor="middle" font-size="11" fill="#0f6e56">Config: hot-reload via control plane</text>
<text x="577" y="2022" text-anchor="middle" font-size="11" fill="#0f6e56">Platform: Istio, Linkerd, Envoy</text>
