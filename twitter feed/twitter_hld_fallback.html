<!-- ====== SECTION 11: TWEET WRITE RESILIENCE ====== -->
<line x1="40" y1="3964" x2="720" y2="3964" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="3956" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— tweet write path resilience (the most critical guarantee) —</text>

<rect x="20"  y="3972" width="720" height="128" rx="8" fill="#0f1923" stroke="#1d9bf0"/>
<text x="380" y="3994" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Why a posted tweet is never lost even on full crash</text>

<rect x="32"  y="4008" width="216" height="80" rx="6" fill="#1a2535" stroke="#1d9bf0"/>
<text x="140" y="4028" text-anchor="middle" font-size="10" font-weight="700" fill="#1d9bf0">ACK-First Write</text>
<text x="140" y="4046" text-anchor="middle" font-size="9"  fill="#8b98a5">Tweet Service ACKs the user</text>
<text x="140" y="4060" text-anchor="middle" font-size="9"  fill="#8b98a5">immediately after Kafka publish</text>
<text x="140" y="4074" text-anchor="middle" font-size="9"  fill="#8b98a5">Cassandra + fan-out are async</text>
<text x="140" y="4082" text-anchor="middle" font-size="9"  fill="#8b98a5">Kafka is the durable source of truth</text>

<rect x="272" y="4008" width="216" height="80" rx="6" fill="#1a2535" stroke="#1d9bf0"/>
<text x="380" y="4028" text-anchor="middle" font-size="10" font-weight="700" fill="#1d9bf0">Idempotency Key</text>
<text x="380" y="4046" text-anchor="middle" font-size="9"  fill="#8b98a5">Client sends unique key per tweet</text>
<text x="380" y="4060" text-anchor="middle" font-size="9"  fill="#8b98a5">Redis checks key before processing</text>
<text x="380" y="4074" text-anchor="middle" font-size="9"  fill="#8b98a5">Retry on 503 → same key returns</text>
<text x="380" y="4082" text-anchor="middle" font-size="9"  fill="#8b98a5">existing tweet; no duplicate posted</text>

<rect x="512" y="4008" width="216" height="80" rx="6" fill="#1a2535" stroke="#1d9bf0"/>
<text x="620" y="4028" text-anchor="middle" font-size="10" font-weight="700" fill="#1d9bf0">Kafka Offset Commit</text>
<text x="620" y="4046" text-anchor="middle" font-size="9"  fill="#8b98a5">Fan-out offsets committed AFTER</text>
<text x="620" y="4060" text-anchor="middle" font-size="9"  fill="#8b98a5">Cassandra write + Redis inbox write</text>
<text x="620" y="4074" text-anchor="middle" font-size="9"  fill="#8b98a5">Fan-out crash → replay from offset</text>
<text x="620" y="4082" text-anchor="middle" font-size="9"  fill="#8b98a5">No tweet silently dropped</text>

<!-- ====== SECTION 12: 5 CRITICAL FALLBACK DECISIONS ====== -->
<line x1="40" y1="4160" x2="720" y2="4160" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<text x="380" y="4152" text-anchor="middle" font-size="11" font-weight="600" fill="#888">— the 5 critical fallback design decisions —</text>

<rect x="20"  y="4168" width="720" height="60" rx="8" fill="#eaf3de" stroke="#3b6d11"/>
<text x="380" y="4188" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">1. Kafka offset committed AFTER Cassandra write — never before</text>
<text x="380" y="4208" text-anchor="middle" font-size="11" fill="#3b6d11">If the Fan-out Service crashes after writing Redis inboxes but before Cassandra, replaying Kafka from the uncommitted offset re-runs that event safely. If offset is committed first and then crash happens, the tweet is never written to Cassandra — lost forever. At-least-once with idempotency key handles duplicates on replay.</text>

<rect x="20"  y="4240" width="720" height="60" rx="8" fill="#faece7" stroke="#993c1d"/>
<text x="380" y="4260" text-anchor="middle" font-size="12" font-weight="700" fill="#712b13">2. Fan-out for celebrities must never block — it's the biggest scalability risk</text>
<text x="380" y="4280" text-anchor="middle" font-size="11" fill="#993c1d">A tweet from a user with 100M followers triggers 100M Redis inbox writes. That is not fan-out-on-write. The pull model (store once in Celebrity Store, fetch at read time per follower) ensures the Fan-out Service never becomes the bottleneck regardless of follower count. Failure of fan-out only means slightly stale feeds — not a system crash.</text>

<rect x="20"  y="4312" width="720" height="60" rx="8" fill="#e6f1fb" stroke="#185fa5"/>
<text x="380" y="4332" text-anchor="middle" font-size="12" font-weight="700" fill="#0c447c">3. Redis inbox is a cache, not the source of truth — Cassandra always wins on recovery</text>
<text x="380" y="4352" text-anchor="middle" font-size="11" fill="#185fa5">Redis inbox TTL is 5 minutes. The inbox is a pre-built sorted set for fast reads — not the permanent record. If Redis is lost entirely, the feed is rebuilt from Cassandra on next read. The tweet itself is never in Redis — only tweetIds. Cassandra + Kafka together are the ground truth; Redis is the acceleration layer.</text>

<rect x="20"  y="4384" width="720" height="60" rx="8" fill="#faeeda" stroke="#ba7517"/>
<text x="380" y="4404" text-anchor="middle" font-size="12" font-weight="700" fill="#633806">4. Ranking service must have a chronological fallback — never return an empty feed</text>
<text x="380" y="4424" text-anchor="middle" font-size="11" fill="#854f0b">When the ML ranking model is down (OOM / retraining), the Feed Service falls back to pure chronological sort using tweetId (Snowflake IDs are time-ordered). Cassandra's sort key is tweetId DESC — this is the natural order. No ML model needed. A chronological feed is infinitely better than an empty page or an error screen. Users barely notice.</text>

<rect x="20"  y="4456" width="720" height="60" rx="8" fill="#eedefe" stroke="#7f77dd"/>
<text x="380" y="4476" text-anchor="middle" font-size="12" font-weight="700" fill="#3c3489">5. Graph DB (follower list) must be cached — it's on the hot fan-out path</text>
<text x="380" y="4496" text-anchor="middle" font-size="11" fill="#534ab7">Fan-out reads the author's follower list from Neo4j for every single tweet. At 1M tweets/min, that's 1M Neo4j graph traversals per minute. A Neo4j GC pause takes the entire fan-out pipeline down. The follower list is cached in Redis with a 30-min TTL. Neo4j down → stale cached list still fans out. Slightly outdated follower list is far better than no fan-out at all.</text>

<!-- ── FINAL SUMMARY BOX ── -->
<rect x="20"  y="4528" width="720" height="60" rx="8" fill="#0f1923" stroke="#1d9bf0"/>
<text x="380" y="4550" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Twitter handles 6,000 tweets/sec. Fan-out is the hardest problem. Kafka + idempotency + Redis inbox = zero tweet loss on any single component crash.</text>
<text x="380" y="4570" text-anchor="middle" font-size="11" fill="#8b98a5">Recovery SLA: Tweet Service &lt;30s · Redis &lt;15s · Kafka &lt;30s · Cassandra partial (RF=3) · Graph DB &lt;45s (cached) · Full DC &lt;2min</text>
